        /* HEADER E LIVELLI STACKING */
        .sticky-header { position: sticky; top: 0; z-index: 1000; background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(10px); border-bottom: 2px solid var(--gold); }
        .header-title { padding: 15px 20px 10px; display: flex; justify-content: space-between; align-items: center; }

        .db-status.red { border-color: var(--red); color: var(--red); }
        
        .top-nav { display: flex; justify-content: space-around; padding: 10px 0; }
        .nav-item { color: #fff; text-align: center; font-family: 'Montserrat'; font-size: 0.85rem; font-weight: 900; flex: 1; cursor: pointer; padding: 5px 0; }
        .nav-item.active { color: var(--gold); }

        /* TAB CONTENUTI */
        .tab-content { display: none; padding: 20px; animation: fadeIn 0.2s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* SEARCH BAR BILANCIATA */
        .search-container { display: flex; gap: 5px; margin-bottom: 10px; align-items: stretch; }
        .search-input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 0.9rem; min-width: 0; }

        .btn-reset { background: #444; border: none; padding: 0 12px; border-radius: 10px; color: white; cursor: pointer; font-size: 0.9rem; }

        /* PANNELLO FILTRI */

            display: none; background: #161616; padding: 15px; border-radius: 10px; 
            margin-bottom: 15px; border: 1px solid #333; 
            position: relative; z-index: 9999;
            pointer-events: auto;
        }
        .filters-panel.active { display: flex; gap: 10px; flex-wrap: wrap; }
        .filter-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 80px; }
        .filter-group label { font-size: 0.7rem; color: var(--gold); font-weight: bold; }
        
        .filter-group input, .filter-group select {

        .filter-group select {

            background-repeat: no-repeat;
            background-position: right 10px top 50%;
            background-size: 12px auto;
            padding-right: 30px;
        }

        .btn-now-playing { width: 100%; padding: 15px; border-radius: 12px; border: none; background: linear-gradient(45deg, #f5c518, #d4a815); color: #000; font-family: 'Montserrat'; font-weight: 900; margin-bottom: 10px; cursor: pointer; }
        .sort-toggle, .view-toggle { display: flex; background: #1a1a1a; border-radius: 10px; margin-bottom: 10px; border: 1px solid #333; overflow: hidden; }
        .sort-btn, .view-btn { flex: 1; text-align: center; padding: 10px; font-weight: 800; font-size: 0.7rem; color: #666; cursor: pointer; }
        .sort-btn.active, .view-btn.active { background: var(--gold); color: #000; }
        .movies-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .grid-item { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); position: relative; cursor: pointer; }

        .list-item { background: #1a1a1a; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; margin-bottom: 6px; cursor: pointer; }

        .btn-back { background: #333; color: #fff; width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 800; margin-bottom: 15px; font-size: 0.85rem; cursor: pointer; }

        .data-label { color: var(--gold); font-weight: 900; font-family: 'Montserrat'; font-size: 0.75rem; text-transform: uppercase; margin-top: 15px; display: block; }
        .data-value { color: #fff; font-size: 0.95rem; display: block; margin-top: 4px; line-height: 1.4; }

        .btn-trailer { background: #ff0000; color: #fff; width: 100%; padding: 15px; border-radius: 12px; font-weight: 900; border: none; margin-top: 25px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; }

    <script>
        const CLIENT_ID = '62527185116-dvsbjccvpib45bu7k3are8aeekadas3v.apps.googleusercontent.com';
        const FOLDER_NAME = "Cinema Lab cassaforte";
        const FILE_NAME = "athena_vault.json";
        const TMDB_API_KEY = "e2d58e4dfdd0a14cdce19d08d49bb21e";
        
        let accessToken = null, vaultFileId = null;
        let currentVault = []; 
        let currentMovieArray = [], currentSortMode = 'recent', currentViewMode = 'list';
        let lastScrollPos = 0, localDB = [];

        const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);

        const COUNTRY_ISO_MAP = {
            "Afghanistan":"AF","Albania":"AL","Algeria":"DZ","American Samoa":"AS","Angola":"AO","Argentina":"AR","Armenia":"AM","Australia":"AU","Austria":"AT","Azerbaijan":"AZ","Bahamas":"BS","Bangladesh":"BD","Belarus":"BY","Belgium":"BE","Benin":"BJ","Bhutan":"BT","Bolivia":"BO","Bosnia and Herzegovina":"BA","Botswana":"BW","Brazil":"BR","Bulgaria":"BG","Burkina Faso":"BF","Cambodia":"KH","Cameroon":"CM","Canada":"CA","Cape Verde":"CV","Cayman Islands":"KY","Central African Republic":"CF","Chad":"TD","Chile":"CL","China":"CN","Colombia":"CO","Congo":"CG","Costa Rica":"CR","Cote D'Ivoire":"CI","Croatia":"HR","Cuba":"CU","Cyprus":"CY","Czech Republic":"CZ","Czechoslovakia":"XC","Denmark":"DK","Dominican Republic":"DO","East Germany":"XG","Ecuador":"EC","Egypt":"EG","Estonia":"EE","Ethiopia":"ET","Faeroe Islands":"FO","Finland":"FI","France":"FR","French Polynesia":"PF","Gabon":"GA","Georgia":"GE","Germany":"DE","Ghana":"GH","Gibraltar":"GI","Greece":"GR","Greenland":"GL","Guadaloupe":"GP","Guatemala":"GT","Guinea-Bissau":"GW","Haiti":"HT","Holy See":"VA","Honduras":"HN","Hong Kong":"HK","Hungary":"HU","Iceland":"IS","India":"IN","Indonesia":"ID","Iran":"IR","Iraq":"IQ","Ireland":"IE","Israel":"IL","Italy":"IT","Jamaica":"JM","Japan":"JP","Jordan":"JO","Kazakhstan":"KZ","Kenya":"KE","Kiribati":"KI","Kosovo":"XK","Kuwait":"KW","Kyrgyz Republic":"KG","Lao People's Democratic Republic":"LA","Latvia":"LV","Lebanon":"LB","Libyan Arab Jamahiriya":"LY","Liechtenstein":"LI","Lithuania":"LT","Luxembourg":"LU","Macao":"MO","Macedonia":"MK","Malaysia":"MY","Mali":"ML","Malta":"MT","Mauritania":"MR","Mexico":"MX","Moldova":"MD","Monaco":"MC","Mongolia":"MN","Montenegro":"ME","Morocco":"MA","Myanmar":"MM","Namibia":"NA","Nepal":"NP","Netherlands":"NL","Netherlands Antilles":"AN","New Zealand":"NZ","Nicaragua":"NI","Niger":"NE","Nigeria":"NG","North Korea":"KP","Norway":"NO","Pakistan":"PK","Palestinian Territory":"PS","Panama":"PA","Paraguay":"PY","Peru":"PE","Philippines":"PH","Poland":"PL","Portugal":"PT","Puerto Rico":"PR","Qatar":"QA","Romania":"RO","Russia":"RU","Samoa":"WS","San Marino":"SM","Saudi Arabia":"SA","Senegal":"SN","Serbia":"RS","Serbia and Montenegro":"CS","Singapore":"SG","Slovakia":"SK","Slovenia":"SI","Somalia":"SO","South Africa":"ZA","South Korea":"KR","Soviet Union":"SU","Spain":"ES","Sri Lanka":"LK","Suriname":"SR","Swaziland":"SZ","Sweden":"SE","Switzerland":"CH","Syrian Arab Republic":"SY","Taiwan":"TW","Tajikistan":"TJ","Tanzania":"TZ","Thailand":"TH","Togo":"TG","Tunisia":"TN","Turkey":"TR","Turks and Caicos Islands":"TC","US Virgin Islands":"VI","Ukraine":"UA","United Arab Emirates":"AE","United Kingdom":"GB","United States of America":"US","Uruguay":"UY","Uzbekistan":"UZ","Vanuatu":"VU","Venezuela":"VE","Vietnam":"VN","Yemen":"YE","Yugoslavia":"YU","Zambia":"ZM","Zimbabwe":"ZW"
        };

        function initLocalDB() {
            const request = indexedDB.open("AthenaVaultDB", 1);
            request.onsuccess = (e) => {
                const db = e.target.result;
                const tx = db.transaction("json_store", "readonly");
                const store = tx.objectStore("json_store");
                const getReq = store.get("master_db");
                getReq.onsuccess = (ev) => { 
                    if (ev.target.result) { 
                        localDB = ev.target.result.data; 
                        updateDbStatus(); 
                    }
                    populateCountryDropdown(); 
                };
            };
        }
        initLocalDB();

        function loadLocalDatabase(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    localDB = JSON.parse(e.target.result);
                    const request = indexedDB.open("AthenaVaultDB", 1);
                    request.onsuccess = (ev) => {
                        const db = ev.target.result;
                        const tx = db.transaction("json_store", "readwrite");
                        tx.objectStore("json_store").put({ id: "master_db", data: localDB });
                        tx.oncomplete = () => { updateDbStatus(); populateCountryDropdown(); alert("✅ DB Memorizzato!"); };
                    };
                } catch (err) { alert("❌ Errore JSON."); }
            };
            reader.readAsText(file);
        }

        function updateDbStatus() {
            const statusDiv = document.getElementById("dbStatus");
            if (localDB.length === 0) { statusDiv.className = "db-status red"; statusDiv.innerHTML = "🔴 DB: Assente (Solo TMDB)"; return; }
            let maxDate = "1900-01-01";
            localDB.forEach(m => { if (m.release_date && m.release_date > maxDate) maxDate = m.release_date; });
            const formattedDate = maxDate.split('-').reverse().join('/');
            const diffDays = Math.floor((new Date().getTime() - new Date(maxDate).getTime()) / (1000 * 60 * 60 * 24));
            statusDiv.className = diffDays <= 21 ? "db-status green" : "db-status red";
            statusDiv.innerHTML = diffDays <= 21 ? `🟢 DB Allineato (${formattedDate})` : `🔴 Aggiorna DB (${formattedDate})`;
        }

        function populateCountryDropdown() {
            const select = document.getElementById('filterCountry');
            select.innerHTML = '<option value="">Tutte le nazioni</option>';

            if (localDB.length === 0) {
                const topCountries = [
                    "United States of America", "Italy", "France", "United Kingdom", 
                    "Japan", "South Korea", "Germany", "Spain", "Canada", 
                    "Australia", "China", "India", "Brazil", "Mexico", 
                    "Argentina", "Sweden", "Denmark", "Russia", "Hong Kong", "Ireland"
                ];
                topCountries.sort().forEach(c => { 
                    const opt = document.createElement('option'); 
                    opt.value = c; 
                    opt.textContent = c; 
                    select.appendChild(opt); 
                });
                return; 
            }

            const countrySet = new Set();
            localDB.forEach(m => { 
                if (m.paese && m.paese !== "N/D") { 
                    m.paese.split(',').forEach(c => { 
                        const t = c.trim(); 
                        if (t) countrySet.add(t); 
                    }); 
                } 
            });
            Array.from(countrySet).sort().forEach(c => { 
                const opt = document.createElement('option'); 
                opt.value = c; 
                opt.textContent = c; 
                select.appendChild(opt); 
            });
        }

        function toggleFilters() { document.getElementById("filtersPanel").classList.toggle("active"); }

        function resetFilters() {
            document.getElementById('manualSearch').value = '';
            document.getElementById('filterYearFrom').value = '';
            document.getElementById('filterYearTo').value = '';
            document.getElementById('filterCountry').selectedIndex = 0;
            currentMovieArray = [];
            document.getElementById('resultsContainer').innerHTML = '';
            if (document.getElementById("filtersPanel").classList.contains("active")) toggleFilters();
        }

        async function intializeGapiClient() { await gapi.client.init({ discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"] }); }
        window.onload = () => { gapi.load('client', intializeGapiClient); };
        function handleAuthClick() {
            const tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID, scope: 'https://www.googleapis.com/auth/drive.file',
                callback: async (resp) => { accessToken = resp.access_token; document.getElementById('loginOverlay').style.display = 'none'; await startCloudSync(); },
            });
            tokenClient.requestAccessToken();
        }
        async function startCloudSync() {
            try {
                await gapi.client.load('drive', 'v3');
                const folderResp = await gapi.client.drive.files.list({ q: `name='${FOLDER_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false` });
                let fId = folderResp.result.files.length > 0 ? folderResp.result.files[0].id : (await gapi.client.drive.files.create({ resource: { name: FOLDER_NAME, mimeType: 'application/vnd.google-apps.folder' }, fields: 'id' })).result.id;
                const fileResp = await gapi.client.drive.files.list({ q: `name='${FILE_NAME}' and '${fId}' in parents and trashed=false` });
                if (fileResp.result.files.length > 0) {
                    vaultFileId = fileResp.result.files[0].id;
                    currentVault = await (await fetch(`https://www.googleapis.com/drive/v3/files/${vaultFileId}?alt=media`, { headers: { Authorization: `Bearer ${accessToken}` } })).json();
                } else {
                    const b = 'foo_bar_baz', m = { name: FILE_NAME, parents: [fId], mimeType: 'application/json' };
                    const body = `--${b}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(m)}\r\n--${b}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify([])}\r\n--${b}--`;
                    await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', { method: 'POST', headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': `multipart/related; boundary=${b}` }, body: body });
                    const check = await gapi.client.drive.files.list({ q: `name='${FILE_NAME}' and trashed=false` });
                    vaultFileId = check.result.files[0].id;
                }
                document.getElementById('syncIndicator').innerText = "Cloud Sincronizzato ✓";
            } catch (e) { document.getElementById('syncIndicator').innerText = "Errore Sync Cloud"; }
        }
        async function saveToCloud() {
            const b = 'foo_bar_baz', m = { name: FILE_NAME, mimeType: 'application/json' };
            const body = `--${b}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(m)}\r\n--${b}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(currentVault)}\r\n--${b}--`;
            await fetch(`https://www.googleapis.com/upload/drive/v3/files/${vaultFileId}?uploadType=multipart`, { method: 'PATCH', headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': `multipart/related; boundary=${b}` }, body: body });
        }

        async function fetchTimeMachine() {
            const rc = document.getElementById('resultsContainer');
            rc.innerHTML = '<p style="text-align:center; color:#f5c518;">In viaggio...</p>';
            const today = new Date(), past = new Date(); past.setDate(today.getDate() - 180);
            try {
                const baseUrl = `https://api.themoviedb.org/3/discover/movie?api_key=${TMDB_API_KEY}&language=it-IT&region=IT&release_date.gte=${past.toISOString().split('T')[0]}&with_release_type=2|3`;
                const responses = await Promise.all([...Array(20).keys()].map(p => fetch(`${baseUrl}&page=${p+1}`)));
                const datasets = await Promise.all(responses.map(r => r.json()));
                let combined = []; datasets.forEach(d => { if(d.results) combined = combined.concat(d.results); });
                currentMovieArray = Array.from(new Map(combined.filter(m => m.release_date && new Date(m.release_date) >= past).map(m => [m.id, m])).values());
                renderUI();
            } catch (e) { rc.innerHTML = '<p style="text-align:center; color:var(--red);">Errore scanner.</p>'; }
        }

        async function searchManual() {
            const query = document.getElementById('manualSearch').value.toLowerCase().trim();
            const yearFrom = document.getElementById('filterYearFrom').value;
            const yearTo = document.getElementById('filterYearTo').value;
            const country = document.getElementById('filterCountry').value;
            const rc = document.getElementById('resultsContainer');
            if(!query && !yearFrom && !yearTo && !country) return;
            rc.innerHTML = '<p style="text-align:center; color:#f5c518;">Ricerca in corso (potrebbe richiedere qualche istante)...</p>';
            
            const validateMovie = (m) => {
                const releaseYear = m.release_date ? parseInt(m.release_date.substring(0,4)) : 0;
                if ((yearFrom || yearTo) && releaseYear === 0) return false;
                const matchYearFrom = !yearFrom || releaseYear >= parseInt(yearFrom);
                const matchYearTo = !yearTo || releaseYear <= parseInt(yearTo);
                
                let matchCountry = false;
                if (!country) {
                    matchCountry = true;
                } else if (m.paese && m.paese !== "N/D") {
                    const paesiArray = m.paese.split(',').map(c => c.trim());
                    matchCountry = paesiArray.includes(country);
                } else if (m.origin_country && COUNTRY_ISO_MAP[country]) {
                    matchCountry = m.origin_country.includes(COUNTRY_ISO_MAP[country]);
                }

                return matchYearFrom && matchYearTo && matchCountry;
            };

            if (localDB.length > 0) {
                let res = localDB.filter(m => {
                    const matchText = !query || (m.title && m.title.toLowerCase().includes(query)) || (m.cast && m.cast.toLowerCase().includes(query)) || (m.director && m.director.toLowerCase().includes(query));
                    return matchText && validateMovie(m);
                });
                if (res.length > 0) { 
                    currentMovieArray = res;
                    renderUI(); 
                    return; 
                }
            }

            try {
                let discUrl = `https://api.themoviedb.org/3/discover/movie?api_key=${TMDB_API_KEY}&language=it-IT&region=IT&sort_by=release_date.desc`;
                if (yearFrom) discUrl += `&release_date.gte=${parseInt(yearFrom)}-01-01`;
                if (yearTo) discUrl += `&release_date.lte=${parseInt(yearTo)}-12-31`;
                if (country && COUNTRY_ISO_MAP[country]) discUrl += `&with_origin_country=${COUNTRY_ISO_MAP[country]}`;
                
                let risultati_totali = new Map(); 

                if (query) {
                    const res_movie = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&language=it-IT&region=IT&query=${encodeURIComponent(query)}`);
                    const data_movie = await res_movie.json();
                    (data_movie.results || []).forEach(m => risultati_totali.set(m.id, m));

                    const res_person = await fetch(`https://api.themoviedb.org/3/search/person?api_key=${TMDB_API_KEY}&language=it-IT&query=${encodeURIComponent(query)}`);
                    const data_person = await res_person.json();
                    const persone = data_person.results || [];

                    if (persone.length > 0) {
                        const person_id = persone[0].id;
                        let url_discover_base = `https://api.themoviedb.org/3/discover/movie?api_key=${TMDB_API_KEY}&language=it-IT&region=IT&with_cast=${person_id}&sort_by=release_date.desc`;
                        
                        const res_p1 = await fetch(url_discover_base + "&page=1");
                        const data_p1 = await res_p1.json();
                        (data_p1.results || []).forEach(m => risultati_totali.set(m.id, m));
                        
                        const tot_pages = data_p1.total_pages || 1;
                        const tot_pages_fetch = Math.min(tot_pages, 20); 
                        
                        if (tot_pages_fetch > 1) {
                            const pagePromises = [];
                            for (let p = 2; p <= tot_pages_fetch; p++) {
                                pagePromises.push(fetch(url_discover_base + `&page=${p}`).then(r => r.json()));
                            }
                            const pagesData = await Promise.all(pagePromises);
                            pagesData.forEach(pd => {
                                (pd.results || []).forEach(m => risultati_totali.set(m.id, m));
                            });
                        }
                    }
                    
                    let final_results = Array.from(risultati_totali.values());
                    final_results = final_results.filter(m => validateMovie(m));
                    currentMovieArray = final_results;

                } else {
                    const responses = await Promise.all([...Array(20).keys()].map(p => fetch(`${discUrl}&page=${p+1}`)));
                    const datasets = await Promise.all(responses.map(r => r.json()));
                    let combined = [];
                    datasets.forEach(d => { if(d.results) combined = combined.concat(d.results); });
                    currentMovieArray = Array.from(new Map(combined.map(m => [m.id, m])).values());
                }
                
                renderUI();
            } catch (e) { 
                rc.innerHTML = '<p style="text-align:center; color:var(--red);">Errore di rete o timeout TMDB.</p>'; 
            }
        }

        function renderUI() {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = '';
            currentMovieArray.sort((a, b) => currentSortMode === 'recent' ? new Date(b.release_date || 0) - new Date(a.release_date || 0) : (b.popularity || 0) - (a.popularity || 0));
            
            const countMsg = document.createElement('div');
            countMsg.style = "text-align:center; color:#aaa; font-size:0.75rem; margin-bottom:10px;";
            countMsg.textContent = `Risultati estratti: ${currentMovieArray.length}`;
            container.appendChild(countMsg);

            const frag = document.createDocumentFragment();
            const ctrl = document.createElement('div');
            ctrl.innerHTML = `<div class="sort-toggle"><div class="sort-btn ${currentSortMode === 'recent' ? 'active' : ''}" onclick="toggleSort('recent')">📅 RECENTI</div><div class="sort-btn ${currentSortMode === 'popular' ? 'active' : ''}" onclick="toggleSort('popular')">🔥 POPOLARITÀ</div></div><div class="view-toggle"><div class="view-btn ${currentViewMode === 'grid' ? 'active' : ''}" onclick="toggleView('grid')">🖼️ GRIGLIA</div><div class="view-btn ${currentViewMode === 'list' ? 'active' : ''}" onclick="toggleView('list')">📄 ELENCO</div></div>`;
            frag.appendChild(ctrl);
            const wrapper = document.createElement('div');
            wrapper.className = currentViewMode === 'grid' ? 'movies-grid' : 'list-view-container';
            currentMovieArray.forEach(m => {
                const item = document.createElement('div');
                item.className = currentViewMode === 'grid' ? 'grid-item' : 'list-item';
                item.addEventListener('click', () => openDetails(m.id));
                if (currentViewMode === 'grid') {
                    const b = document.createElement('div'); b.className = 'movie-badge'; b.textContent = currentSortMode === 'popular' ? `🔥 ${Math.round(m.popularity)}` : (m.release_date ? m.release_date.split('-').reverse().join('/') : 'N/D');
                    const img = document.createElement('img'); img.className = 'grid-poster'; img.src = m.poster_path ? (m.poster_path.startsWith('/') ? `https://image.tmdb.org/t/p/w300${m.poster_path}` : m.poster_path) : 'https://via.placeholder.com/300x450?text=No+Poster';
                    const t = document.createElement('div'); t.className = 'grid-title'; t.textContent = m.title;
                    item.append(b, img, t);
                } else {
                    const t = document.createElement('div'); t.className = 'list-title'; t.textContent = m.title;
                    const d = document.createElement('div'); d.className = 'list-data-dynamic'; d.innerHTML = `${currentSortMode === 'popular' ? '🔥 '+Math.round(m.popularity) : (m.release_date ? m.release_date.split('-').reverse().join('/') : 'N/D')}<br><span style="font-size:0.6rem; color:#888;">${m.paese || ''}</span>`;
                    item.append(t, d);
                }
                wrapper.appendChild(item);
            });
            frag.appendChild(wrapper);
            container.appendChild(frag);
        }

        async function openDetails(id) {
            lastScrollPos = window.scrollY;
            let m = localDB.find(x => String(x.id) === String(id));
            if (!m) {
                const tmdb = await (await fetch(`https://api.themoviedb.org/3/movie/${id}?api_key=${TMDB_API_KEY}&language=it-IT&append_to_response=credits`)).json();
                m = { id: tmdb.id, title: tmdb.title, poster_path: tmdb.poster_path, release_date: tmdb.release_date, popularity: tmdb.popularity, overview: tmdb.overview, paese: tmdb.production_countries?.map(c => c.name).join(', ') || "N/D", genres: tmdb.genres?.map(g => g.name).join(', ') || "N/D", director: tmdb.credits?.crew?.find(p => p.job === 'Director')?.name || "N/D", cast: tmdb.credits?.cast?.slice(0, 5).map(a => a.name).join(', ') || "N/D" };
            }
            const post = m.poster_path ? (m.poster_path.startsWith('/') ? `https://image.tmdb.org/t/p/w500${m.poster_path}` : m.poster_path) : 'https://via.placeholder.com/500x750?text=No+Poster';
            document.getElementById('main-db-view').style.display = 'none';
            const dv = document.getElementById('detail-view'); dv.style.display = 'block'; dv.innerHTML = '';
            const b = document.createElement('button'); b.className = 'btn-back'; b.textContent = '← TORNA'; b.onclick = () => { dv.style.display = 'none'; document.getElementById('main-db-view').style.display = 'block'; setTimeout(() => window.scrollTo(0, lastScrollPos), 10); };
            const c = document.createElement('div'); c.className = 'movie-card';
            
            c.innerHTML = `<img src="${post}" style="width:100%"><div class="movie-info"><h2>${m.title}</h2><span class="data-label">Uscita</span><span class="data-value">${m.release_date ? m.release_date.split('-').reverse().join('/') : 'N/D'}</span><span class="data-label">Produzione</span><span class="data-value">${m.paese}</span><span class="data-label">Genere</span><span class="data-value">${m.genres}</span><span class="data-label">Regia</span><span class="data-value">${m.director}</span><span class="data-label">Cast Principale</span><span class="data-value">${m.cast}</span><p>${m.overview || ""}</p><button class="btn-trailer" onclick="window.open('https://www.youtube.com/results?search_query=Trailer+ita+${encodeURIComponent(m.title)}','_blank')">▶ TRAILER</button></div>`;
            
            const s = document.createElement('button'); s.className = 'btn-save'; s.textContent = '💾 SALVA CLOUD'; s.onclick = () => saveToWL(m.id, m.title, post, m.release_date);
            c.querySelector('.movie-info').appendChild(s);
            dv.append(b, c); window.scrollTo(0, 0);
        }

        function switchTab(t, el) { document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active')); document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active')); document.getElementById('tab-' + t).classList.add('active'); if(el) el.classList.add('active'); if(t === 'watchlist') renderWatchlist(); window.scrollTo(0, 0); }
        async function saveToWL(id, title, poster, date) { const s = String(id); let i = currentVault.findIndex(x => String(x.id) === s); if(i !== -1) { currentVault[i].date = date || 'N/D'; } else { currentVault.unshift({id: s, title, poster, date: date || 'N/D'}); } await saveToCloud(); alert("Salvato!"); }
        function renderWatchlist() {
            const c = document.getElementById('watchlistContainer');
            if(currentVault.length === 0) { c.innerHTML = '<p style="text-align:center; color:#555; margin-top:50px;">Cassaforte vuota.</p>'; return; }
            c.innerHTML = currentVault.map(m => `<div class="wl-item"><img src="${m.poster}" class="wl-poster" onclick="viewFromVault('${m.id}')"><div class="wl-content" onclick="viewFromVault('${m.id}')"><div style="font-weight:700;">${m.title}</div><div style="font-size:0.75rem; color:var(--gold);">📅 ${m.date ? m.date.split('-').reverse().join('/') : 'N/D'}</div></div><button class="btn-delete-wl" onclick="removeWL('${m.id}')">X</button></div>`).join('');
        }
        function viewFromVault(id) { switchTab('database', document.getElementById('nav-db')); openDetails(id); }
        async function removeWL(id) { if(confirm("Eliminare?")) { currentVault = currentVault.filter(x => String(x.id) !== String(id)); renderWatchlist(); await saveToCloud(); } }
        function toggleSort(m) { currentSortMode = m; renderUI(); }
        function toggleView(m) { currentViewMode = m; renderUI(); }
    </script>
</body>
