<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Athena Lab V9.0 Ibrida</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <style>
        :root { --bg-dark: #0f0f0f; --gold: #f5c518; --red: #e74c3c; --green: #2ecc71; --text-light: #fff; --text-muted: #bbb; --card-bg: rgba(255, 255, 255, 0.05); }
        body { background-color: var(--bg-dark); color: var(--text-light); font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 40px; -webkit-font-smoothing: antialiased; }
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .sync-status { font-size: 0.65rem; color: var(--gold); padding: 5px; background: #000; text-align: center; border-bottom: 1px solid #333; }
        .sticky-header { position: sticky; top: 0; z-index: 1000; background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(10px); border-bottom: 2px solid var(--gold); }
        .header-title { padding: 15px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        .header-title h1 { color: var(--gold); font-size: 1.5rem; font-weight: 900; margin: 0; font-family: 'Montserrat'; }
        .db-status { font-size: 0.65rem; padding: 5px 10px; border-radius: 12px; background: #222; font-weight: 800; cursor: pointer; border: 1px solid #444; text-transform: uppercase; }
        .db-status.green { border-color: var(--green); color: var(--green); }
        .db-status.red { border-color: var(--red); color: var(--red); }
        .top-nav { display: flex; justify-content: space-around; padding: 10px 0; }
        .nav-item { color: #fff; text-align: center; font-family: 'Montserrat'; font-size: 0.85rem; font-weight: 900; flex: 1; cursor: pointer; padding: 5px 0; }
        .nav-item.active { color: var(--gold); }
        .tab-content { display: none; padding: 20px; animation: fadeIn 0.2s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .search-container { display: flex; gap: 8px; margin-bottom: 10px; }
        .search-input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 0.9rem; }
        .btn-filter { background: #333; border: none; padding: 0 15px; border-radius: 10px; font-size: 1.2rem; cursor: pointer; color: white; }
        .btn-search { background: var(--gold); border: none; padding: 0 20px; border-radius: 10px; font-weight: 900; cursor: pointer; color: #000; }
        .filters-panel { display: none; background: rgba(255,255,255,0.02); padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #333; }
        .filters-panel.active { display: flex; gap: 10px; flex-wrap: wrap; }
        .filter-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 80px; }
        .filter-group label { font-size: 0.7rem; color: var(--gold); font-weight: bold; }
        .filter-group input, .filter-group select { padding: 8px; background: #121212; border: 1px solid #444; color: white; border-radius: 6px; font-size: 0.8rem; appearance: none; }
        .btn-now-playing { width: 100%; padding: 15px; border-radius: 12px; border: none; background: linear-gradient(45deg, #f5c518, #d4a815); color: #000; font-family: 'Montserrat'; font-weight: 900; margin-bottom: 10px; cursor: pointer; }
        .sort-toggle, .view-toggle { display: flex; background: #1a1a1a; border-radius: 10px; margin-bottom: 10px; border: 1px solid #333; overflow: hidden; }
        .sort-btn, .view-btn { flex: 1; text-align: center; padding: 10px; font-weight: 800; font-size: 0.7rem; color: #666; cursor: pointer; }
        .sort-btn.active, .view-btn.active { background: var(--gold); color: #000; }
        .movies-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .grid-item { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); position: relative; cursor: pointer; }
        .grid-poster { width: 100%; display: block; aspect-ratio: 2/3; object-fit: cover; }
        .grid-title { font-size: 0.8rem; font-weight: 700; padding: 8px; text-align: center; }
        .movie-badge { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.8); color: var(--gold); font-size: 0.65rem; font-weight: 900; padding: 3px 6px; border-radius: 4px; border: 1px solid var(--gold); backdrop-filter: blur(5px); }
        .list-item { background: #1a1a1a; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; margin-bottom: 6px; cursor: pointer; }
        .list-data-dynamic { color: var(--gold); font-size: 0.75rem; font-weight: 900; font-family: 'Montserrat'; text-align: right; }
        .btn-back { background: #333; color: #fff; width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 800; margin-bottom: 15px; font-size: 0.85rem; cursor: pointer; }
        .movie-card { background: var(--card-bg); border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .movie-info { padding: 20px; }
        .data-label { color: var(--gold); font-weight: 900; font-family: 'Montserrat'; font-size: 0.75rem; text-transform: uppercase; margin-top: 15px; display: block; }
        .data-value { color: #fff; font-size: 0.95rem; display: block; margin-top: 4px; line-height: 1.4; }
        .btn-save { background: var(--green); color: #000; width: 100%; padding: 15px; border-radius: 12px; font-weight: 900; border: none; margin-top: 10px; cursor: pointer; }
        .btn-trailer { background: #ff0000; color: #fff; width: 100%; padding: 15px; border-radius: 12px; font-weight: 900; border: none; margin-top: 25px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .wl-item { display: flex; align-items: center; background: #1a1a1a; padding: 12px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #333; }
        .wl-poster { width: 50px; height: 75px; border-radius: 6px; margin-right: 15px; object-fit: cover; cursor: pointer; }
        .wl-content { flex: 1; cursor: pointer; }
        .btn-delete-wl { background: rgba(231, 76, 60, 0.1); color: var(--red); border: 1px solid var(--red); padding: 8px 12px; border-radius: 8px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <h1 style="color: var(--gold); font-family: 'Montserrat'; font-weight: 900; font-size: 2rem;">ATHENA V9.0</h1>
        <p style="margin-bottom: 30px; font-size: 0.9rem; color: #aaa;">Protezione Cloud Attiva</p>
        <button class="btn-search" style="padding: 20px 40px; font-size: 1rem;" onclick="handleAuthClick()">ENTRA NELLA CASSAFORTE</button>
    </div>

    <div id="syncIndicator" class="sync-status">ATTESA CONNESSIONE DRIVE...</div>

    <div class="sticky-header">
        <div class="header-title">
            <h1>ATHENA LAB</h1>
            <div id="dbStatus" class="db-status red" onclick="document.getElementById('fileInput').click()">🔴 DB: Assente (Solo TMDB)</div>
            <input type="file" id="fileInput" accept=".json" style="display: none;" onchange="loadLocalDatabase(event)">
        </div>
        <div class="top-nav">
            <div id="nav-db" class="nav-item active" onclick="switchTab('database', this)">🔍 DATABASE</div>
            <div id="nav-cinema" class="nav-item" onclick="switchTab('cinema', this)">🎟️ IN SALA</div>
            <div id="nav-wl" class="nav-item" onclick="switchTab('watchlist', this)">💾 CASSAFORTE</div>
        </div>
    </div>

    <div id="tab-database" class="tab-content active">
        <div id="main-db-view">
            <div class="search-container">
                <input type="text" id="manualSearch" class="search-input" placeholder="Cerca titolo, regista o attore..." onkeypress="if(event.key === 'Enter') searchManual()">
                <button class="btn-filter" onclick="toggleFilters()">⚙️</button>
                <button class="btn-search" onclick="searchManual()">GO</button>
            </div>
            
            <div id="filtersPanel" class="filters-panel">
                <div class="filter-group">
                    <label>Dal (Anno)</label>
                    <input type="number" id="filterYearFrom" placeholder="es. 1990" onkeypress="if(event.key === 'Enter') searchManual()">
                </div>
                <div class="filter-group">
                    <label>Al (Anno)</label>
                    <input type="number" id="filterYearTo" placeholder="es. 2026" onkeypress="if(event.key === 'Enter') searchManual()">
                </div>
                <div class="filter-group">
                    <label>Paese</label>
                    <select id="filterCountry" onchange="searchManual()">
                        <option value="">Tutte le nazioni</option>
                    </select>
                </div>
            </div>

            <button class="btn-now-playing" onclick="fetchTimeMachine()">🎬 TIME MACHINE (400 TITOLI - 180GG)</button>
            <div id="resultsContainer"></div>
        </div>
        <div id="detail-view" style="display:none;"></div>
    </div>

    <div id="tab-cinema" class="tab-content">
        <button class="btn-search" style="background:var(--red); color:#fff; width:100%; padding:15px; border-radius:12px; border:none; font-weight:800; margin-bottom: 20px;" onclick="window.open('https://www.google.com/search?q=cinema+vicino+a+me+orari','_blank')">📍 CINEMA VICINO A ME (GPS)</button>
        <h3 style="color: #fff; margin: 20px 0 10px; font-size: 0.9rem; text-align: center; font-family: 'Montserrat';">I TUOI PREFERITI</h3>
        <div style="display:grid; gap:10px;">
            <button onclick="window.open('https://www.facebook.com/supercinemacastello/#','_blank')" style="background:#1a1a1a; color:var(--gold); border:1px solid var(--gold); padding:12px; border-radius:10px; font-weight:800;">🍿 SUPERCINEMA (Fondi)</button>
            <button onclick="window.open('https://www.facebook.com/cinemaugusto/','_blank')" style="background:#1a1a1a; color:var(--gold); border:1px solid var(--gold); padding:12px; border-radius:10px; font-weight:800;">🍿 AUGUSTO (Sperlonga)</button>
            <button onclick="window.open('https://www.cinemateatrotraiano.it/','_blank')" style="background:#1a1a1a; color:var(--gold); border:1px solid var(--gold); padding:12px; border-radius:10px; font-weight:800;">🍿 TRAIANO (Terracina)</button>
            <button onclick="window.open('https://www.riocinemamultisala.com/','_blank')" style="background:#1a1a1a; color:var(--gold); border:1px solid var(--gold); padding:12px; border-radius:10px; font-weight:800;">🍿 RIO (Terracina)</button>
            <button onclick="window.open('https://www.aristongaeta.it/programmazione-cinema/','_blank')" style="background:#1a1a1a; color:var(--gold); border:1px solid var(--gold); padding:12px; border-radius:10px; font-weight:800;">🍿 ARISTON (Gaeta)</button>
            <button onclick="window.open('https://multisaladelmare.18tickets.it/','_blank')" style="background:#1a1a1a; color:var(--gold); border:1px solid var(--gold); padding:12px; border-radius:10px; font-weight:800;">🍿 DEL MARE (Formia)</button>
        </div>
    </div>

    <div id="tab-watchlist" class="tab-content"><div id="watchlistContainer"></div></div>

    <script>
        const CLIENT_ID = '62527185116-dvsbjccvpib45bu7k3are8aeekadas3v.apps.googleusercontent.com';
        const FOLDER_NAME = "Cinema Lab cassaforte";
        const FILE_NAME = "athena_vault.json";
        const TMDB_API_KEY = "e2d58e4dfdd0a14cdce19d08d49bb21e";
        
        let accessToken = null, vaultFileId = null;
        let currentVault = []; 
        let currentMovieArray = [], currentSortMode = 'recent', currentViewMode = 'list';
        let lastScrollPos = 0, localDB = [];

        // --- DIZIONARIO ISO 167 NAZIONI (MAPPATURA CAVEAU) ---
        const COUNTRY_ISO_MAP = {
            "Afghanistan":"AF","Albania":"AL","Algeria":"DZ","American Samoa":"AS","Angola":"AO","Argentina":"AR","Armenia":"AM","Australia":"AU","Austria":"AT","Azerbaijan":"AZ","Bahamas":"BS","Bangladesh":"BD","Belarus":"BY","Belgium":"BE","Benin":"BJ","Bhutan":"BT","Bolivia":"BO","Bosnia and Herzegovina":"BA","Botswana":"BW","Brazil":"BR","Bulgaria":"BG","Burkina Faso":"BF","Cambodia":"KH","Cameroon":"CM","Canada":"CA","Cape Verde":"CV","Cayman Islands":"KY","Central African Republic":"CF","Chad":"TD","Chile":"CL","China":"CN","Colombia":"CO","Congo":"CG","Costa Rica":"CR","Cote D'Ivoire":"CI","Croatia":"HR","Cuba":"CU","Cyprus":"CY","Czech Republic":"CZ","Czechoslovakia":"XC","Denmark":"DK","Dominican Republic":"DO","East Germany":"XG","Ecuador":"EC","Egypt":"EG","Estonia":"EE","Ethiopia":"ET","Faeroe Islands":"FO","Finland":"FI","France":"FR","French Polynesia":"PF","Gabon":"GA","Georgia":"GE","Germany":"DE","Ghana":"GH","Gibraltar":"GI","Greece":"GR","Greenland":"GL","Guadaloupe":"GP","Guatemala":"GT","Guinea-Bissau":"GW","Haiti":"HT","Holy See":"VA","Honduras":"HN","Hong Kong":"HK","Hungary":"HU","Iceland":"IS","India":"IN","Indonesia":"ID","Iran":"IR","Iraq":"IQ","Ireland":"IE","Israel":"IL","Italy":"IT","Jamaica":"JM","Japan":"JP","Jordan":"JO","Kazakhstan":"KZ","Kenya":"KE","Kiribati":"KI","Kosovo":"XK","Kuwait":"KW","Kyrgyz Republic":"KG","Lao People's Democratic Republic":"LA","Latvia":"LV","Lebanon":"LB","Libyan Arab Jamahiriya":"LY","Liechtenstein":"LI","Lithuania":"LT","Luxembourg":"LU","Macao":"MO","Macedonia":"MK","Malaysia":"MY","Mali":"ML","Malta":"MT","Mauritania":"MR","Mexico":"MX","Moldova":"MD","Monaco":"MC","Mongolia":"MN","Montenegro":"ME","Morocco":"MA","Myanmar":"MM","Namibia":"NA","Nepal":"NP","Netherlands":"NL","Netherlands Antilles":"AN","New Zealand":"NZ","Nicaragua":"NI","Niger":"NE","Nigeria":"NG","North Korea":"KP","Norway":"NO","Pakistan":"PK","Palestinian Territory":"PS","Panama":"PA","Paraguay":"PY","Peru":"PE","Philippines":"PH","Poland":"PL","Portugal":"PT","Puerto Rico":"PR","Qatar":"QA","Romania":"RO","Russia":"RU","Samoa":"WS","San Marino":"SM","Saudi Arabia":"SA","Senegal":"SN","Serbia":"RS","Serbia and Montenegro":"CS","Singapore":"SG","Slovakia":"SK","Slovenia":"SI","Somalia":"SO","South Africa":"ZA","South Korea":"KR","Soviet Union":"SU","Spain":"ES","Sri Lanka":"LK","Suriname":"SR","Swaziland":"SZ","Sweden":"SE","Switzerland":"CH","Syrian Arab Republic":"SY","Taiwan":"TW","Tajikistan":"TJ","Tanzania":"TZ","Thailand":"TH","Togo":"TG","Tunisia":"TN","Turkey":"TR","Turks and Caicos Islands":"TC","US Virgin Islands":"VI","Ukraine":"UA","United Arab Emirates":"AE","United Kingdom":"GB","United States of America":"US","Uruguay":"UY","Uzbekistan":"UZ","Vanuatu":"VU","Venezuela":"VE","Vietnam":"VN","Yemen":"YE","Yugoslavia":"YU","Zambia":"ZM","Zimbabwe":"ZW"
        };

        function initLocalDB() {
            const request = indexedDB.open("AthenaVaultDB", 1);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains("json_store")) db.createObjectStore("json_store", { keyPath: "id" });
            };
            request.onsuccess = (e) => {
                const db = e.target.result;
                const tx = db.transaction("json_store", "readonly");
                const store = tx.objectStore("json_store");
                const getReq = store.get("master_db");
                getReq.onsuccess = (ev) => {
                    if (ev.target.result) {
                        localDB = ev.target.result.data;
                        updateDbStatus();
                        populateCountryDropdown();
                    }
                };
            };
        }
        initLocalDB();

        function loadLocalDatabase(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    localDB = JSON.parse(e.target.result);
                    const request = indexedDB.open("AthenaVaultDB", 1);
                    request.onsuccess = (ev) => {
                        const db = ev.target.result;
                        const tx = db.transaction("json_store", "readwrite");
                        const store = tx.objectStore("json_store");
                        store.put({ id: "master_db", data: localDB });
                        tx.oncomplete = () => {
                            updateDbStatus();
                            populateCountryDropdown();
                            alert("✅ Database memorizzato permanentemente nel Caveau!");
                        };
                    };
                } catch (err) { alert("❌ Errore nella lettura del file JSON."); }
            };
            reader.readAsText(file);
        }

        function updateDbStatus() {
            const statusDiv = document.getElementById("dbStatus");
            if (localDB.length === 0) { statusDiv.className = "db-status red"; statusDiv.innerHTML = "🔴 DB: Assente (Solo TMDB)"; return; }
            let maxDate = "1900-01-01";
            localDB.forEach(m => { if (m.release_date && m.release_date > maxDate) maxDate = m.release_date; });
            const maxDateObj = new Date(maxDate), today = new Date();
            const diffDays = Math.floor((today.getTime() - maxDateObj.getTime()) / (1000 * 60 * 60 * 24));
            const formattedDate = maxDate.split('-').reverse().join('/');
            if (diffDays <= 21) { statusDiv.className = "db-status green"; statusDiv.innerHTML = `🟢 DB Allineato (${formattedDate})`; }
            else { statusDiv.className = "db-status red"; statusDiv.innerHTML = `🔴 Aggiorna DB (${formattedDate})`; }
        }

        function populateCountryDropdown() {
            if (localDB.length === 0) return;
            const countrySet = new Set();
            localDB.forEach(m => { if (m.paese && m.paese !== "N/D") { m.paese.split(',').forEach(c => { const trimmed = c.trim(); if (trimmed) countrySet.add(trimmed); }); } });
            const select = document.getElementById('filterCountry');
            select.innerHTML = '<option value="">Tutte le nazioni</option>';
            Array.from(countrySet).sort().forEach(c => {
                const opt = document.createElement('option');
                opt.value = c; opt.textContent = c;
                select.appendChild(opt);
            });
        }

        function toggleFilters() { document.getElementById("filtersPanel").classList.toggle("active"); }

        // --- GOOGLE DRIVE CLOUD (COPIA CARBONE) ---
        function updateStatus(msg) { document.getElementById('syncIndicator').innerText = msg; }
        async function intializeGapiClient() { await gapi.client.init({ discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"] }); }
        window.onload = () => { gapi.load('client', intializeGapiClient); };
        function handleAuthClick() {
            const tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID, scope: 'https://www.googleapis.com/auth/drive.file',
                callback: async (resp) => { if (resp.error) return; accessToken = resp.access_token; document.getElementById('loginOverlay').style.display = 'none'; await startCloudSync(); },
            });
            tokenClient.requestAccessToken();
        }
        async function startCloudSync() {
            updateStatus("Sincronizzazione Cloud in corso...");
            try {
                await gapi.client.load('drive', 'v3');
                const folderResp = await gapi.client.drive.files.list({ q: `name='${FOLDER_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false` });
                let folderId = folderResp.result.files.length > 0 ? folderResp.result.files[0].id : (await gapi.client.drive.files.create({ resource: { name: FOLDER_NAME, mimeType: 'application/vnd.google-apps.folder' }, fields: 'id' })).result.id;
                const fileResp = await gapi.client.drive.files.list({ q: `name='${FILE_NAME}' and '${folderId}' in parents and trashed=false` });
                if (fileResp.result.files.length > 0) {
                    vaultFileId = fileResp.result.files[0].id;
                    const response = await fetch(`https://www.googleapis.com/drive/v3/files/${vaultFileId}?alt=media`, { headers: { Authorization: `Bearer ${accessToken}` } });
                    currentVault = await response.json();
                } else {
                    const boundary = 'foo_bar_baz', metadata = { name: FILE_NAME, parents: [folderId], mimeType: 'application/json' };
                    const body = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify([])}\r\n--${boundary}--`;
                    await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', { method: 'POST', headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': `multipart/related; boundary=${boundary}` }, body: body });
                    const checkResp = await gapi.client.drive.files.list({ q: `name='${FILE_NAME}' and trashed=false` });
                    vaultFileId = checkResp.result.files[0].id;
                }
                updateStatus("Cloud Sincronizzato ✓");
                if(document.getElementById('tab-watchlist').classList.contains('active')) renderWatchlist();
            } catch (e) { updateStatus("Errore Sync Cloud"); }
        }
        async function saveToCloud() {
            const boundary = 'foo_bar_baz', metadata = { name: FILE_NAME, mimeType: 'application/json' };
            const body = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(currentVault)}\r\n--${boundary}--`;
            await fetch(`https://www.googleapis.com/upload/drive/v3/files/${vaultFileId}?uploadType=multipart`, { method: 'PATCH', headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': `multipart/related; boundary=${boundary}` }, body: body });
            updateStatus("Cloud Sincronizzato ✓");
        }

        // --- MOTORE DI RICERCA VALIDATO (LOGICA ANNO ZERO & TRADUTTORE) ---
        async function fetchTimeMachine() {
            const resultsContainer = document.getElementById('resultsContainer');
            resultsContainer.innerHTML = '<p style="text-align:center; color:#f5c518;">Viaggio nel tempo (180gg/400 Titoli)...</p>';
            const today = new Date(), past = new Date(); past.setDate(today.getDate() - 180);
            const pStr = past.toISOString().split('T')[0], fStr = new Date(today.getTime() + 21*24*60*60*1000).toISOString().split('T')[0];
            try {
                const baseUrl = `https://api.themoviedb.org/3/discover/movie?api_key=${TMDB_API_KEY}&language=it-IT&region=IT&release_date.gte=${pStr}&release_date.lte=${fStr}&with_release_type=2|3`;
                const responses = await Promise.all([...Array(20).keys()].map(p => fetch(`${baseUrl}&page=${p+1}`)));
                const datasets = await Promise.all(responses.map(r => r.json()));
                let combined = []; datasets.forEach(d => { if(d.results) combined = combined.concat(d.results); });
                currentMovieArray = Array.from(new Map(combined.filter(m => m.release_date && new Date(m.release_date) >= past).map(m => [m.id, m])).values());
                renderUI();
            } catch (e) { resultsContainer.innerHTML = '<p style="text-align:center; color:var(--red);">Errore scanner.</p>'; }
        }

        async function searchManual() {
            const query = document.getElementById('manualSearch').value.toLowerCase().trim();
            const yearFrom = document.getElementById('filterYearFrom').value;
            const yearTo = document.getElementById('filterYearTo').value;
            const country = document.getElementById('filterCountry').value;
            const resultsContainer = document.getElementById('resultsContainer');
            if(!query && !yearFrom && !yearTo && !country) return;
            resultsContainer.innerHTML = '<p style="text-align:center; color:#f5c518;">Ricerca in corso...</p>';
            
            if (localDB.length > 0) {
                let results = localDB.filter(m => {
                    const matchText = !query || (m.title && m.title.toLowerCase().includes(query)) || (m.cast && m.cast.toLowerCase().includes(query)) || (m.director && m.director.toLowerCase().includes(query));
                    
                    // LOGICA ANNO ZERO: Escludi se anno mancante durante ricerca temporale
                    const releaseYear = m.release_date ? parseInt(m.release_date.substring(0,4)) : 0;
                    if ((yearFrom || yearTo) && releaseYear === 0) return false;
                    
                    const matchYearFrom = !yearFrom || releaseYear >= parseInt(yearFrom);
                    const matchYearTo = !yearTo || releaseYear <= parseInt(yearTo);
                    const matchCountry = !country || (m.paese && m.paese.includes(country));
                    return matchText && matchYearFrom && matchYearTo && matchCountry;
                });
                if (results.length > 0) { currentMovieArray = results.slice(0, 100); renderUI(); return; }
            }

            try {
                let discoverUrl = `https://api.themoviedb.org/3/discover/movie?api_key=${TMDB_API_KEY}&language=it-IT&region=IT&sort_by=release_date.desc`;
                if (yearFrom) discoverUrl += `&primary_release_date.gte=${yearFrom}-01-01`;
                if (yearTo) discoverUrl += `&primary_release_date.lte=${yearTo}-12-31`;
                
                // TRADUTTORE ISO SILENZIOSO
                if (country && COUNTRY_ISO_MAP[country]) discoverUrl += `&with_origin_country=${COUNTRY_ISO_MAP[country]}`;
                
                if (query) {
                    const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&language=it-IT&query=${encodeURIComponent(query)}`);
                    currentMovieArray = (await res.json()).results || [];
                } else {
                    currentMovieArray = (await (await fetch(discoverUrl)).json()).results || [];
                }
                renderUI();
            } catch (e) { resultsContainer.innerHTML = '<p style="text-align:center; color:var(--red);">Errore di rete TMDB.</p>'; }
        }

        // --- RENDERING DOM NODES PROFESSIONALE (VALIDATO IPHONE) ---
        function renderUI() {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = '';
            currentMovieArray.sort((a, b) => currentSortMode === 'recent' ? new Date(b.release_date || 0) - new Date(a.release_date || 0) : (b.popularity || 0) - (a.popularity || 0));

            const fragment = document.createDocumentFragment();
            const controls = document.createElement('div');
            controls.className = 'controls-ui';
            controls.innerHTML = `<div class="sort-toggle"><div class="sort-btn ${currentSortMode === 'recent' ? 'active' : ''}" onclick="toggleSort('recent')">📅 RECENTI</div><div class="sort-btn ${currentSortMode === 'popular' ? 'active' : ''}" onclick="toggleSort('popular')">🔥 POPOLARITÀ</div></div><div class="view-toggle"><div class="view-btn ${currentViewMode === 'grid' ? 'active' : ''}" onclick="toggleView('grid')">🖼️ GRIGLIA</div><div class="view-btn ${currentViewMode === 'list' ? 'active' : ''}" onclick="toggleView('list')">📄 ELENCO</div></div>`;
            fragment.appendChild(controls);

            const wrapper = document.createElement('div');
            wrapper.className = currentViewMode === 'grid' ? 'movies-grid' : 'list-view-container';

            currentMovieArray.forEach(m => {
                const item = document.createElement('div');
                item.className = currentViewMode === 'grid' ? 'grid-item' : 'list-item';
                item.addEventListener('click', () => openDetails(m.id));

                if (currentViewMode === 'grid') {
                    const badge = document.createElement('div');
                    badge.className = 'movie-badge';
                    badge.textContent = currentSortMode === 'popular' ? `🔥 ${Math.round(m.popularity)}` : (m.release_date ? m.release_date.split('-').reverse().join('/') : 'N/D');
                    const img = document.createElement('img');
                    img.className = 'grid-poster';
                    img.src = m.poster_path ? (m.poster_path.startsWith('/') ? `https://image.tmdb.org/t/p/w300${m.poster_path}` : m.poster_path) : 'https://via.placeholder.com/300x450?text=No+Poster';
                    const title = document.createElement('div');
                    title.className = 'grid-title';
                    title.textContent = m.title;
                    item.append(badge, img, title);
                } else {
                    const title = document.createElement('div');
                    title.className = 'list-title';
                    title.textContent = m.title;
                    const data = document.createElement('div');
                    data.className = 'list-data-dynamic';
                    data.innerHTML = `${currentSortMode === 'popular' ? '🔥 '+Math.round(m.popularity) : (m.release_date ? m.release_date.split('-').reverse().join('/') : 'N/D')}<br><span style="font-size:0.6rem; color:#888;">${m.paese || ''}</span>`;
                    item.append(title, data);
                }
                wrapper.appendChild(item);
            });
            fragment.appendChild(wrapper);
            container.appendChild(fragment);
        }

        async function openDetails(id) {
            lastScrollPos = window.scrollY;
            let m = localDB.find(x => String(x.id) === String(id));
            if (!m) {
                const tmdb = await (await fetch(`https://api.themoviedb.org/3/movie/${id}?api_key=${TMDB_API_KEY}&language=it-IT&append_to_response=credits`)).json();
                m = { id: tmdb.id, title: tmdb.title, poster_path: tmdb.poster_path, release_date: tmdb.release_date, popularity: tmdb.popularity, overview: tmdb.overview, paese: tmdb.production_countries?.map(c => c.name).join(', ') || "N/D", genres: tmdb.genres?.map(g => g.name).join(', ') || "N/D", director: tmdb.credits?.crew?.find(p => p.job === 'Director')?.name || "N/D", cast: tmdb.credits?.cast?.slice(0, 5).map(a => a.name).join(', ') || "N/D" };
            }
            const poster = m.poster_path ? (m.poster_path.startsWith('/') ? `https://image.tmdb.org/t/p/w500${m.poster_path}` : m.poster_path) : 'https://via.placeholder.com/500x750?text=No+Poster';
            document.getElementById('main-db-view').style.display = 'none';
            const detailView = document.getElementById('detail-view');
            detailView.style.display = 'block';
            detailView.innerHTML = '';
            
            const backBtn = document.createElement('button');
            backBtn.className = 'btn-back'; backBtn.textContent = '← TORNA ALL\'ELENCO';
            backBtn.onclick = closeDetails;
            
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.innerHTML = `<img src="${poster}" style="width:100%"><div class="movie-info"><h2>${m.title}</h2><span class="data-label">Uscita Italia</span><span class="data-value">${m.release_date ? m.release_date.split('-').reverse().join('/') : 'N/D'}</span><span class="data-label">Produzione</span><span class="data-value">${m.paese}</span><span class="data-label">Genere</span><span class="data-value">${m.genres}</span><span class="data-label">Regia</span><span class="data-value">${m.director}</span><span class="data-label">Cast Principale</span><span class="data-value">${m.cast}</span><span class="data-label">Sinossi</span><p>${m.overview || "Trama non disponibile."}</p><button class="btn-trailer" onclick="window.open('https://www.youtube.com/results?search_query=Trailer+ita+${encodeURIComponent(m.title)}','_blank')">▶ TRAILER YOUTUBE</button></div>`;
            
            const saveBtn = document.createElement('button');
            saveBtn.className = 'btn-save'; saveBtn.textContent = '💾 SALVA NEL CLOUD';
            saveBtn.onclick = () => saveToWL(m.id, m.title, poster, m.release_date);
            card.querySelector('.movie-info').appendChild(saveBtn);
            
            detailView.append(backBtn, card);
            window.scrollTo(0, 0);
        }

        function closeDetails() { document.getElementById('detail-view').style.display = 'none'; document.getElementById('main-db-view').style.display = 'block'; setTimeout(() => { window.scrollTo(0, lastScrollPos); }, 10); }
        function switchTab(t, el) { document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active')); document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active')); document.getElementById('tab-' + t).classList.add('active'); if(el) el.classList.add('active'); if(t === 'database') closeDetails(); if(t === 'watchlist') renderWatchlist(); window.scrollTo(0, 0); }
        async function saveToWL(id, title, poster, date) { const strId = String(id); let idx = currentVault.findIndex(x => String(x.id) === strId); if(idx !== -1) { currentVault[idx].date = date || 'N/D'; alert("Aggiornato!"); } else { currentVault.unshift({id: strId, title, poster, date: date || 'N/D'}); alert("Salvato!"); } await saveToCloud(); }
        function renderWatchlist() {
            const container = document.getElementById('watchlistContainer');
            if(currentVault.length === 0) { container.innerHTML = '<p style="text-align:center; color:#555; margin-top:50px;">Cassaforte vuota.</p>'; return; }
            container.innerHTML = currentVault.map(m => `<div class="wl-item"><img src="${m.poster}" class="wl-poster" onclick="viewFromVault('${m.id}')"><div class="wl-content" onclick="viewFromVault('${m.id}')"><div class="wl-title" style="font-weight:700;">${m.title}</div><div style="font-size:0.75rem; color:var(--gold); font-weight:700;">📅 ${m.date ? m.date.split('-').reverse().join('/') : 'N/D'}</div></div><button class="btn-delete-wl" onclick="removeWL('${m.id}')">X</button></div>`).join('');
        }
        function viewFromVault(id) { switchTab('database', document.getElementById('nav-db')); openDetails(id); }
        async function removeWL(id) { if(confirm("Eliminare dal Cloud?")) { currentVault = currentVault.filter(x => String(x.id) !== String(id)); renderWatchlist(); await saveToCloud(); } }
        function toggleSort(m) { currentSortMode = m; renderUI(); }
        function toggleView(m) { currentViewMode = m; renderUI(); }
    </script>
</body>
</html>
