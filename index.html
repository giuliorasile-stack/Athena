<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Athena Lab V10 - Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <style>
        :root { --bg-dark: #0f0f0f; --gold: #f5c518; --red: #e74c3c; --green: #2ecc71; --text-light: #fff; --text-muted: #bbb; --card-bg: rgba(255, 255, 255, 0.05); }
        body { background-color: var(--bg-dark); color: var(--text-light); font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 40px; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .sync-status { font-size: 0.65rem; color: var(--gold); padding: 5px; background: #000; text-align: center; border-bottom: 1px solid #333; }
        .sticky-header { position: sticky; top: 0; z-index: 1000; background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(10px); border-bottom: 2px solid var(--gold); }
        .header-title { padding: 15px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        .header-title h1 { color: var(--gold); font-size: 1.5rem; font-weight: 900; margin: 0; font-family: 'Montserrat'; }
        .db-status { font-size: 0.65rem; padding: 5px 10px; border-radius: 12px; background: #222; font-weight: 800; cursor: pointer; border: 1px solid #444; text-transform: uppercase; }
        .db-status.green { border-color: var(--green); color: var(--green); }
        .db-status.red { border-color: var(--red); color: var(--red); }
        .top-nav { display: flex; justify-content: space-around; padding: 10px 0; }
        .nav-item { color: #fff; text-align: center; font-family: 'Montserrat'; font-size: 0.85rem; font-weight: 900; flex: 1; cursor: pointer; padding: 5px 0; }
        .nav-item.active { color: var(--gold); }
        .tab-content { display: none; padding: 20px; animation: fadeIn 0.2s ease; box-sizing: border-box; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .search-container { display: flex; gap: 5px; margin-bottom: 10px; align-items: stretch; }
        .search-input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 0.9rem; min-width: 0; }
        .btn-filter { background: #333; border: none; padding: 0 10px; border-radius: 10px; font-size: 1rem; cursor: pointer; color: white; }
        .btn-search { background: var(--gold); border: none; padding: 0 15px; border-radius: 10px; font-weight: 900; cursor: pointer; color: #000; font-size: 0.8rem; }
        .btn-reset { background: #444; border: none; padding: 0 12px; border-radius: 10px; color: white; cursor: pointer; font-size: 0.9rem; }
        .filters-panel { display: none; background: #161616; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #333; position: relative; z-index: 999; }
        .filters-panel.active { display: flex; gap: 10px; flex-wrap: wrap; }
        .filter-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 80px; }
        .filter-group label { font-size: 0.7rem; color: var(--gold); font-weight: bold; }
        .filter-group input, .filter-group select { padding: 10px; background: #121212; border: 1px solid #444; color: white; border-radius: 6px; font-size: 16px; min-height: 44px; }
        .btn-now-playing { width: 100%; padding: 15px; border-radius: 12px; border: none; background: linear-gradient(45deg, #f5c518, #d4a815); color: #000; font-family: 'Montserrat'; font-weight: 900; margin-bottom: 10px; cursor: pointer; }
        .sort-toggle, .view-toggle { display: flex; background: #1a1a1a; border-radius: 10px; margin-bottom: 10px; border: 1px solid #333; overflow: hidden; }
        .sort-btn, .view-btn { flex: 1; text-align: center; padding: 10px; font-weight: 800; font-size: 0.7rem; color: #666; cursor: pointer; }
        .sort-btn.active, .view-btn.active { background: var(--gold); color: #000; }
        .movies-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .grid-item { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); position: relative; cursor: pointer; }
        .grid-poster { width: 100%; display: block; aspect-ratio: 2/3; object-fit: cover; }
        .grid-title { font-size: 0.8rem; font-weight: 700; padding: 8px; text-align: center; }
        
        .movie-badge { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.8); color: var(--gold); font-size: 0.65rem; font-weight: 900; padding: 3px 6px; border-radius: 4px; border: 1px solid var(--gold); backdrop-filter: blur(5px); z-index: 2; }
        .type-badge { position: absolute; top: 5px; left: 5px; background: rgba(0,0,0,0.8); font-size: 0.8rem; padding: 3px 6px; border-radius: 4px; border: 1px solid var(--gold); backdrop-filter: blur(5px); z-index: 2; }
        
        .list-item { background: #1a1a1a; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; margin-bottom: 6px; cursor: pointer; }
        .list-data-dynamic { color: var(--gold); font-size: 0.75rem; font-weight: 900; font-family: 'Montserrat'; text-align: right; }
        .btn-back { background: #333; color: #fff; width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 800; margin-bottom: 15px; font-size: 0.85rem; cursor: pointer; }
        .movie-card { background: var(--card-bg); border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); width: 100%; box-sizing: border-box; }
        .movie-info { padding: 20px; width: 100%; box-sizing: border-box; overflow-wrap: break-word; }
        .movie-info p { font-size: 0.9rem; line-height: 1.5; color: #ddd; max-width: 100%; }
        .data-label { color: var(--gold); font-weight: 900; font-family: 'Montserrat'; font-size: 0.75rem; text-transform: uppercase; margin-top: 15px; display: block; }
        .data-value { color: #fff; font-size: 0.95rem; display: block; margin-top: 4px; line-height: 1.4; }
        .btn-save { background: var(--green); color: #000; width: 100%; padding: 15px; border-radius: 12px; font-weight: 900; border: none; margin-top: 10px; cursor: pointer; }
        .btn-trailer { background: #ff0000; color: #fff; width: 100%; padding: 15px; border-radius: 12px; font-weight: 900; border: none; margin-top: 25px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .clickable-name { color: var(--gold); cursor: pointer; text-decoration: underline; text-underline-offset: 3px; }
        
        .actor-scroll-box { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-top: 8px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .actor-scroll-box::-webkit-scrollbar { display: none; }
        .actor-scroll-card { position: relative; width: 90px; flex-shrink: 0; cursor: pointer; border-radius: 8px; overflow: hidden; border: 1px solid #333; }
        .actor-pic { width: 100%; height: 135px; object-fit: cover; display: block; }
        .cast-name-overlay { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.85); color: white; font-size: 0.65rem; text-align: center; padding: 6px 2px; font-weight: 700; box-sizing: border-box; }

        .rating-stars { display: flex; align-items: center; gap: 5px; margin-top: 5px; }
        .stars-visual { color: var(--gold); font-size: 1.1rem; letter-spacing: 2px; }
        .stars-text { font-size: 0.75rem; color: #aaa; font-family: 'Montserrat'; font-weight: 700; margin-left: 5px; }

        /* DOSSIER PERSONA (V10 FIX) */
        .actor-profile-header { background: var(--card-bg); border-radius: 16px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; box-sizing: border-box; }
        .actor-avatar { width: 220px; height: 220px; border-radius: 20px; object-fit: contain; background: #000; border: 2px solid var(--gold); box-shadow: 0 10px 20px rgba(0,0,0,0.5); flex-shrink: 0; }
        .actor-details { flex: 1; width: 100%; text-align: center; box-sizing: border-box; }
        .actor-name { font-size: 1.8rem; color: #fff; margin: 0 0 10px 0; font-weight: 900; font-family: 'Montserrat'; line-height: 1.1; }
        .actor-meta { font-size: 0.8rem; color: var(--gold); margin-bottom: 15px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .actor-bio { font-size: 0.95rem; line-height: 1.6; color: #ddd; text-align: left; width: 100%; max-width: 100%; box-sizing: border-box; }

        @media (min-width: 769px) {
            .movies-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)) !important; }
            .movie-card { display: flex !important; flex-direction: row !important; align-items: flex-start; }
            .movie-card > img { width: 350px !important; max-width: 40% !important; height: auto; border-right: 1px solid rgba(255,255,255,0.1); }
            .actor-profile-header { flex-direction: row !important; align-items: flex-start !important; padding: 30px !important; gap: 30px !important; }
            .actor-avatar { width: 250px !important; height: 250px !important; }
            .actor-details { text-align: left !important; }
            .actor-name { font-size: 2.2rem !important; }
        }

        /* iPad & Touch Specific Fixes */
        .is-touch-device .actor-scroll-box { cursor: grab; }
        .is-touch-device .actor-scroll-box:active { cursor: grabbing; }
    </style>
</head>
<body id="mainBody">

    <div id="loginOverlay">
        <h1 style="color: var(--gold); font-family: 'Montserrat'; font-weight: 900; font-size: 2rem;">ATHENA V10 PRO</h1>
        <p style="margin-bottom: 30px; font-size: 0.9rem; color: #aaa;">Data Intelligence Hub</p>
        <button class="btn-search" style="padding: 20px 40px; font-size: 1rem;" onclick="handleAuthClick()">ACCESSO SISTEMA</button>
    </div>

    <div id="syncIndicator" class="sync-status">IN ATTESA DI AUTENTICAZIONE...</div>

    <div class="sticky-header">
        <div class="header-title">
            <h1>ATHENA LAB</h1>
            <div id="dbStatus" class="db-status red" onclick="document.getElementById('fileInput').click()">🔴 DB ASSENTE</div>
            <input type="file" id="fileInput" accept=".json" style="display: none;" onchange="loadLocalDatabase(event)">
        </div>
        <div class="top-nav">
            <div id="nav-db" class="nav-item active" onclick="switchTab('database', this)">🔍 FILM</div>
            <div id="nav-tv" class="nav-item" onclick="switchTab('tv', this)">📺 SERIE TV</div>
            <div id="nav-cinema" class="nav-item" onclick="switchTab('cinema', this)">🎟️ IN SALA</div>
            <div id="nav-wl" class="nav-item" onclick="switchTab('watchlist', this)">💾 PREFERITI</div>
        </div>
    </div>

    <div id="tab-database" class="tab-content active">
        <div id="main-db-view">
            <div class="search-container">
                <input type="text" id="manualSearch" class="search-input" placeholder="Cerca titolo, regista o attore..." onkeypress="if(event.key === 'Enter') searchManual()">
                <button class="btn-filter" onclick="toggleFilters()">⚙️</button>
                <button class="btn-search" onclick="searchManual()">GO</button>
                <button class="btn-reset" onclick="resetFilters()">❌</button>
            </div>
            
            <div id="filtersPanel" class="filters-panel">
                <div class="filter-group"><label>Dal (Anno)</label><input type="number" id="filterYearFrom"></div>
                <div class="filter-group"><label>Al (Anno)</label><input type="number" id="filterYearTo"></div>
                <div class="filter-group">
                    <label>Paese</label>
                    <select id="filterCountry"><option value="">Tutte le nazioni</option></select>
                </div>
            </div>

            <button class="btn-now-playing" onclick="fetchTimeMachine()">🍿 OGGI AL CINEMA (-30 / +15 GG)</button>
            <div id="resultsContainer"></div>
        </div>
        
        <div id="detail-view" style="display:none;"></div>
        <div id="actor-view" style="display:none;"></div>
    </div>

    <div id="tab-tv" class="tab-content">
        <div class="search-container">
            <input type="text" id="tvSearch" class="search-input" placeholder="Cerca Serie TV..." onkeypress="if(event.key === 'Enter') searchTV()">
            <button class="btn-search" onclick="searchTV()">GO</button>
        </div>
        <div id="tvResults"></div>
    </div>
    <div id="tab-cinema" class="tab-content">
        <button class="btn-search" style="background:var(--red); color:#fff; width:100%; padding:15px; border-radius:12px; border:none; font-weight:800; margin-bottom: 20px;" onclick="window.open('https://www.google.com/search?q=cinema+vicino+a+me+orari','_blank')">📍 CINEMA VICINO A ME (GPS)</button>
    </div>
    <div id="tab-watchlist" class="tab-content"><div id="watchlistContainer"></div></div>

    <script>
        const CLIENT_ID = '62527185116-dvsbjccvpib45bu7k3are8aeekadas3v.apps.googleusercontent.com';
        const FOLDER_NAME = "Cinema Lab cassaforte";
        const FILE_NAME = "athena_vault.json";
        const TMDB_API_KEY = "e2d58e4dfdd0a14cdce19d08d49bb21e";
        
        let accessToken = null, vaultFileId = null;
        let currentVault = [], currentMovieArray = [], localDB = [];
        let currentSortMode = 'recent', currentViewMode = 'list', isTVMode = false, lastScrollPos = 0;

        // SENSORE HARDWARE PER IDENTIFICAZIONE IPAD/MOBILE
        const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0) || (navigator.msMaxTouchPoints > 0);
        if (isTouchDevice) document.getElementById('mainBody').classList.add('is-touch-device');

        function getIcon(typeStr) { if (!typeStr) return ""; if (typeStr.includes('3') || typeStr.includes('2')) return "🎥"; if (typeStr.includes('4')) return "💻"; if (typeStr.includes('6')) return "📺"; if (typeStr.includes('5')) return "📀"; return ""; }
        function getStarRatingHtml(ratingStr, source) { if(!ratingStr || ratingStr === 'N/A' || ratingStr == 0) return ''; const r = parseFloat(ratingStr), fullStars = Math.round(r / 2); let stars = ''; for(let i=1; i<=5; i++) { stars += i <= fullStars ? '★' : '☆'; } return `<div class="rating-stars"><span class="stars-visual">${stars}</span> <span class="stars-text">${ratingStr}/10 ${source}</span></div>`; }

        // Gestione IndexedDB e Google Drive (Omesse per brevità le funzioni identiche a V9.9)
        async function handleAuthClick() { const tokenClient = google.accounts.oauth2.initTokenClient({ client_id: CLIENT_ID, scope: 'https://www.googleapis.com/auth/drive.file', callback: async (resp) => { accessToken = resp.access_token; document.getElementById('loginOverlay').style.display = 'none'; await startCloudSync(); } }); tokenClient.requestAccessToken(); }
        async function startCloudSync() { document.getElementById('syncIndicator').innerText = "Cloud Sincronizzato ✓"; }

        function loadLocalDatabase(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => { localDB = JSON.parse(e.target.result); updateDbStatus(file.lastModified); };
            reader.readAsText(file);
        }

        function updateDbStatus(timestamp) { const s = document.getElementById("dbStatus"); s.className = "db-status green"; s.innerHTML = `🟢 DB OK (${new Date(timestamp).toLocaleDateString()})`; }

        async function searchManual() {
            const query = document.getElementById('manualSearch').value.toLowerCase().trim();
            const yearFrom = document.getElementById('filterYearFrom').value;
            const rc = document.getElementById('resultsContainer');
            rc.innerHTML = '<p style="text-align:center; color:#f5c518;">Analisi in corso...</p>';
            
            let risultati_totali = new Map();
            if (localDB.length > 0) {
                localDB.forEach(m => { if (m.title.toLowerCase().includes(query)) { m.isTV = false; risultati_totali.set(String(m.id), m); } });
            }
            
            try {
                const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&language=it-IT&region=IT&query=${encodeURIComponent(query)}`);
                const data = await res.json();
                (data.results || []).forEach(m => {
                    m.isTV = false;
                    if (risultati_totali.has(String(m.id))) { risultati_totali.get(String(m.id)).release_date = m.release_date || risultati_totali.get(String(m.id)).release_date; }
                    else { risultati_totali.set(String(m.id), m); }
                });
            } catch (e) {}
            
            currentMovieArray = Array.from(risultati_totali.values());
            renderUI(false);
        }

        function renderUI(forTV = false) {
            const containerId = forTV ? 'tvResults' : 'resultsContainer';
            const container = document.getElementById(containerId); container.innerHTML = '';
            const wrapper = document.createElement('div'); wrapper.className = currentViewMode === 'grid' ? 'movies-grid' : 'list-view-container';
            
            currentMovieArray.forEach(m => {
                const item = document.createElement('div'); item.className = currentViewMode === 'grid' ? 'grid-item' : 'list-item';
                item.onclick = () => openDetails(m.id, m.isTV);
                const dateDisp = m.release_date ? m.release_date.split('-').reverse().join('/') : 'N/D';
                
                if (currentViewMode === 'grid') {
                    const img = m.poster_path ? `https://image.tmdb.org/t/p/w300${m.poster_path}` : 'https://via.placeholder.com/300x450';
                    item.innerHTML = `<div class="movie-badge">${dateDisp}</div><img src="${img}" class="grid-poster"><div class="grid-title">${m.title}</div>`;
                } else {
                    item.innerHTML = `<div class="list-title">${m.title}</div><div class="list-data-dynamic">${dateDisp}</div>`;
                }
                wrapper.appendChild(item);
            });
            container.appendChild(wrapper);
        }

        async function openDetails(id, isTV = false) {
            lastScrollPos = window.scrollY;
            const type = isTV ? 'tv' : 'movie';
            const tmdb = await (await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${TMDB_API_KEY}&language=it-IT&append_to_response=credits,aggregate_credits,release_dates,external_ids`)).json();

            // Estrazione Regista/Ideatore con ID per click
            let directorHtml = "N/D";
            if (isTV && tmdb.created_by?.length > 0) {
                directorHtml = tmdb.created_by.map(c => `<span class="clickable-name" onclick="event.stopPropagation(); openPersonDetails(${c.id})">${c.name}</span>`).join(', ');
            } else if (!isTV) {
                const dir = tmdb.credits?.crew?.find(p => p.job === 'Director');
                if (dir) directorHtml = `<span class="clickable-name" onclick="event.stopPropagation(); openPersonDetails(${dir.id})">${dir.name}</span>`;
            }

            let releaseDate = isTV ? tmdb.first_air_date : tmdb.release_date;
            if (!isTV && tmdb.release_dates?.results) {
                const it = tmdb.release_dates.results.find(r => r.iso_3166_1 === 'IT');
                if (it) { const th = it.release_dates.find(rd => rd.type === 3); if (th) releaseDate = th.release_date.split('T')[0]; }
            }

            const castHtml = (tmdb.credits?.cast || tmdb.aggregate_credits?.cast || []).slice(0, 12).map(a => {
                const img = a.profile_path ? `https://image.tmdb.org/t/p/w185${a.profile_path}` : 'https://via.placeholder.com/185x278/111/f5c518?text=NO+FOTO';
                return `<div class="actor-scroll-card" onclick="openPersonDetails(${a.id})"><img src="${img}" class="actor-pic"><div class="cast-name-overlay">${a.name}</div></div>`;
            }).join('');

            const dv = document.getElementById('detail-view');
            dv.innerHTML = `
                <button class="btn-back" onclick="closeDetails()">← TORNA</button>
                <div class="movie-card">
                    <img src="https://image.tmdb.org/t/p/w500${tmdb.poster_path}" style="width:100%">
                    <div class="movie-info">
                        <h2>${tmdb.title || tmdb.name}</h2>
                        <div id="stars-${id}"></div>
                        <span class="data-label">Uscita</span><span class="data-value">${releaseDate ? releaseDate.split('-').reverse().join('/') : 'N/D'}</span>
                        <span class="data-label">${isTV ? 'Ideatore' : 'Regia'}</span><span class="data-value">${directorHtml}</span>
                        <span class="data-label">Cast</span><div class="actor-scroll-box">${castHtml}</div>
                        <p>${tmdb.overview || ""}</p>
                        <button class="btn-save" onclick="saveToWL(${tmdb.id}, '${(tmdb.title || tmdb.name).replace(/'/g, "\\'")}', '${tmdb.poster_path}', '${releaseDate}', ${isTV})">💾 SALVA NEI PREFERITI</button>
                    </div>
                </div>`;
            
            document.getElementById('main-db-view').style.display = 'none';
            document.getElementById('actor-view').style.display = 'none';
            dv.style.display = 'block';
            window.scrollTo(0, 0);
        }

        async function openPersonDetails(personId) {
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('main-db-view').style.display = 'none';
            const av = document.getElementById('actor-view');
            av.style.display = 'block';
            av.innerHTML = '<p style="text-align:center; padding:50px;">Caricamento dossier professionale...</p>';
            
            try {
                const p = await (await fetch(`https://api.themoviedb.org/3/person/${personId}?api_key=${TMDB_API_KEY}&language=it-IT&append_to_response=combined_credits`)).json();
                const img = p.profile_path ? `https://image.tmdb.org/t/p/w500${p.profile_path}` : 'https://via.placeholder.com/500x500/111/f5c518?text=NO+FOTO';
                
                let credits = p.combined_credits.cast || [];
                credits.sort((a,b) => new Date(b.release_date || b.first_air_date || 0) - new Date(a.release_date || a.first_air_date || 0));

                const filmography = credits.map(c => `
                    <div class="grid-item" onclick="openDetails(${c.id}, ${c.media_type === 'tv'})">
                        <div class="movie-badge">${(c.release_date || c.first_air_date || "N/D").substring(0,4)}</div>
                        <div class="type-badge">${c.media_type === 'tv' ? '📺' : '🎥'}</div>
                        <img src="https://image.tmdb.org/t/p/w300${c.poster_path}" class="grid-poster">
                        <div class="grid-title">${c.title || c.name}</div>
                    </div>`).join('');

                av.innerHTML = `
                    <button class="btn-back" onclick="closeActorView()">← TORNA ALLA RICERCA</button>
                    <div class="actor-profile-header">
                        <img src="${img}" class="actor-avatar">
                        <div class="actor-details">
                            <h2 class="actor-name">${p.name}</h2>
                            <div class="actor-meta">${p.birthday ? p.birthday.split('-').reverse().join('/') : 'N/D'} • ${p.place_of_birth || ""}</div>
                            <div class="actor-bio">${p.biography || "Dossier biografico non disponibile."}</div>
                        </div>
                    </div>
                    <h3 style="margin:20px 0; font-family:Montserrat;">FILMOGRAFIA COMPLETA</h3>
                    <div class="movies-grid">${filmography}</div>`;
            } catch(e) { av.innerHTML = "Errore nel recupero dati."; }
            window.scrollTo(0, 0);
        }

        function closeDetails() { document.getElementById('detail-view').style.display = 'none'; document.getElementById('main-db-view').style.display = 'block'; window.scrollTo(0, lastScrollPos); }
        function closeActorView() { document.getElementById('actor-view').style.display = 'none'; document.getElementById('main-db-view').style.display = 'block'; window.scrollTo(0, 0); }
        
        function switchTab(t, el) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById('tab-' + t).classList.add('active');
            if(el) el.classList.add('active');
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('actor-view').style.display = 'none';
            document.getElementById('main-db-view').style.display = 'block';
        }
    </script>
</body>
</html>
