        function initLocalDB() {
            const request = indexedDB.open("AthenaVaultDB", 1);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains("json_store")) db.createObjectStore("json_store", { keyPath: "id" });
            };
            request.onsuccess = (e) => {
                try {
                    const db = e.target.result;
                    const tx = db.transaction("json_store", "readonly");
                    const store = tx.objectStore("json_store");
                    const getReq = store.get("master_db");
                    getReq.onsuccess = (ev) => { 
                        if (ev.target.result && ev.target.result.data) { 
                            localDB = ev.target.result.data; 
                            updateDbStatus(ev.target.result.uploadDate); 
                        }
                        populateCountryDropdown();
                    };
                } catch(err) { populateCountryDropdown(); }
            };
        }
        initLocalDB();

        function loadLocalDatabase(event) {
            const file = event.target.files[0];
            if (!file) return;
            const fileDate = file.lastModified; 
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    localDB = JSON.parse(e.target.result);
                    const request = indexedDB.open("AthenaVaultDB", 1);
                    request.onupgradeneeded = (ev) => {
                        const db = ev.target.result;
                        if (!db.objectStoreNames.contains("json_store")) db.createObjectStore("json_store", { keyPath: "id" });
                    };
                    request.onsuccess = (ev) => {
                        try {
                            const db = ev.target.result;
                            const tx = db.transaction("json_store", "readwrite");
                            tx.objectStore("json_store").put({ id: "master_db", data: localDB, uploadDate: fileDate });
                            tx.oncomplete = () => { updateDbStatus(fileDate); populateCountryDropdown(); alert("✅ DB Memorizzato!"); };
                        } catch (err) { alert("❌ Errore IndexedDB."); }
                    };
                } catch (err) { alert("❌ Errore JSON."); }
            };
            reader.readAsText(file);
        }

        async function searchManual() {

            rc.innerHTML = '<p style="text-align:center; color:#f5c518;">Fusione Database e Rete a Strascico in corso...</p>';
            let risultati_totali = new Map();
            
            const validateMovie = (m, trustTMDB = false) => {
                const releaseYear = m.release_date ? parseInt(m.release_date.substring(0,4)) : 0;
                if ((yearFrom || yearTo) && releaseYear === 0) return false;
                const matchYearFrom = !yearFrom || releaseYear >= parseInt(yearFrom);
                const matchYearTo = !yearTo || releaseYear <= parseInt(yearTo);
                let matchCountry = false;
                if (!country) { matchCountry = true; } else if (m.paese && m.paese !== "N/D") { const paesiArray = m.paese.split(',').map(c => c.trim()); matchCountry = paesiArray.includes(country); } else if (m.origin_country && m.origin_country.length > 0 && COUNTRY_ISO_MAP[country]) { matchCountry = m.origin_country.includes(COUNTRY_ISO_MAP[country]); } else if (trustTMDB) { matchCountry = true; }
                const matchType = !typeQuery || (m.release_type && m.release_type.includes(typeQuery));
                const matchGenre = !genreQuery || (m.genres && m.genres.toLowerCase().includes(genreQuery));
                return matchYearFrom && matchYearTo && matchCountry && matchType && matchGenre;
            };

            if (localDB.length > 0) {
                localDB.forEach(m => {
                    const matchText = !query || (m.title && m.title.toLowerCase().includes(query)) || (m.cast && m.cast.toLowerCase().includes(query)) || (m.director && m.director.toLowerCase().includes(query));

                        const data_credits = await res_credits.json();

                            } else if (validateMovie(m, true)) {

            countMsg.textContent = `Risultati estratti: ${currentMovieArray.length}`; container.appendChild(countMsg);
            const frag = document.createDocumentFragment();
            const ctrl = document.createElement('div'); ctrl.innerHTML = `<div class="sort-toggle"><div class="sort-btn ${currentSortMode === 'recent' ? 'active' : ''}" onclick="toggleSort('recent')">📅 RECENTI</div><div class="sort-btn ${currentSortMode === 'popular' ? 'active' : ''}" onclick="toggleSort('popular')">🔥 POPOLARITÀ</div></div><div class="view-toggle"><div class="view-btn ${currentViewMode === 'grid' ? 'active' : ''}" onclick="toggleView('grid')">🖼️ GRIGLIA</div><div class="view-btn ${currentViewMode === 'list' ? 'active' : ''}" onclick="toggleView('list')">📄 ELENCO</div></div>`;
            frag.appendChild(ctrl);
            const wrapper = document.createElement('div'); wrapper.className = currentViewMode === 'grid' ? 'movies-grid' : 'list-view-container';
            currentMovieArray.forEach(m => {
                const item = document.createElement('div'); item.className = currentViewMode === 'grid' ? 'grid-item' : 'list-item';
                item.addEventListener('click', () => openDetails(m.id, m.isTV));
                const icon = m.isTV ? "📺" : getIcon(m.release_type);
                
                if (currentViewMode === 'grid') {
                    if (icon) { const tb = document.createElement('div'); tb.className = 'type-badge'; tb.textContent = icon; item.appendChild(tb); }
                    const b = document.createElement('div'); b.className = 'movie-badge'; b.textContent = currentSortMode === 'popular' ? `🔥 ${Math.round(m.popularity)}` : (m.release_date ? m.release_date.split('-').reverse().join('/') : 'N/D');
                    const img = document.createElement('img'); img.className = 'grid-poster'; 
                    if (m.poster_path) {
                        img.src = m.poster_path.startsWith('/') ? `https://image.tmdb.org/t/p/w300${m.poster_path}` : m.poster_path;
                    } else {
                        img.src = 'https://via.placeholder.com/300x450?text=Ricerca...';
                    }
                    const t = document.createElement('div'); t.className = 'grid-title'; t.textContent = m.title; item.append(b, img, t);
                } else {
                    const t = document.createElement('div'); t.className = 'list-title'; t.textContent = (icon ? icon + ' ' : '') + m.title;
                    const d = document.createElement('div'); d.className = 'list-data-dynamic'; d.innerHTML = `${currentSortMode === 'popular' ? '🔥 '+Math.round(m.popularity) : (m.release_date ? m.release_date.split('-').reverse().join('/') : 'N/D')}<br><span style="font-size:0.6rem; color:#888;">${m.paese || ''}</span>`;
                    item.append(t, d);
                }
                wrapper.appendChild(item);
            });
            frag.appendChild(wrapper); container.appendChild(frag);
        }

        async function openDetails(id, isTV = false) {
            lastScrollPos = window.scrollY;
            let m = localDB.find(x => String(x.id) === String(id) && x.isTV === isTV);
            
            const fetchType = isTV ? 'tv' : 'movie';
            const tmdb = await (await fetch(`https://api.themoviedb.org/3/${fetchType}/${id}?api_key=${TMDB_API_KEY}&language=it-IT&append_to_response=credits,aggregate_credits,release_dates,external_ids`)).json();

            let finalDate = isTV ? (tmdb.first_air_date || tmdb.release_date) : tmdb.release_date;
            if (!isTV && tmdb.release_dates?.results) {
                const itRelease = tmdb.release_dates.results.find(r => r.iso_3166_1 === 'IT');
                if (itRelease) {
                    const theaterDate = itRelease.release_dates.find(rd => rd.type === 3);
                    if (theaterDate) finalDate = theaterDate.release_date.split('T')[0];
                }
            }

            let tvStatusHtml = "";
            let tvStructureHtml = "";
            if (isTV) {
                let statusText = "SCONOSCIUTO";
                let statusColor = "#555";
                if (tmdb.status === "Returning Series") { statusText = "IN CORSO"; statusColor = "var(--green)"; }
                else if (tmdb.status === "Ended") { statusText = "CONCLUSA"; statusColor = "var(--red)"; }
                else if (tmdb.status === "Canceled") { statusText = "CANCELLATA"; statusColor = "var(--red)"; }
                else if (tmdb.status) { statusText = tmdb.status.toUpperCase(); }

                tvStatusHtml = `<span style="font-size:0.65rem; background:${statusColor}; color:#000; padding:2px 6px; border-radius:4px; margin-left:10px; font-weight:900; vertical-align:middle; letter-spacing:0px;">${statusText}</span>`;

                let stagioni = tmdb.number_of_seasons || 0;
                let episodi = tmdb.number_of_episodes || 0;
                let sWord = stagioni === 1 ? 'Stagione' : 'Stagioni';
                tvStructureHtml = `<span class="data-label">Struttura</span><span class="data-value">${stagioni} ${sWord} &bull; ${episodi} Episodi totali</span>`;
            }

            let finalDirector = "N/D";
            let directorHtml = "N/D";
            
            if (isTV) {
                if (tmdb.created_by && tmdb.created_by.length > 0) {
                    finalDirector = tmdb.created_by.map(c => c.name).join(', ');
                    directorHtml = tmdb.created_by.map(c => `<span class="clickable-name" onclick="event.stopPropagation(); openActorDetails(${c.id})">${c.name}</span>`).join(', ');
                }
                else if (tmdb.aggregate_credits?.crew) { 
                    let dir = tmdb.aggregate_credits.crew.find(p => p.job === 'Director' || p.department === 'Directing'); 
                    if (dir) {
                        finalDirector = dir.name;
                        directorHtml = `<span class="clickable-name" onclick="event.stopPropagation(); openActorDetails(${dir.id})">${dir.name}</span>`;
                    }
                }
            } else {
                let dir = tmdb.credits?.crew?.find(p => p.job === 'Director');
                if (dir) {
                    finalDirector = dir.name;
                    directorHtml = `<span class="clickable-name" onclick="event.stopPropagation(); openActorDetails(${dir.id})">${dir.name}</span>`;
                }
            }

            if (!m) {
                m = { 
                    id: tmdb.id, title: isTV ? (tmdb.name || tmdb.title) : tmdb.title, poster_path: tmdb.poster_path, 
                    release_date: finalDate, popularity: tmdb.popularity, overview: tmdb.overview, 
                    paese: isTV ? (tmdb.origin_country?.join(', ') || "N/D") : (tmdb.production_countries?.map(c => c.name).join(', ') || "N/D"), 
                    genres: tmdb.genres?.map(g => g.name).join(', ') || "N/D", director: finalDirector, isTV: isTV 
                };
            } else {
                m.release_date = finalDate || m.release_date;
                if(finalDirector !== "N/D") m.director = finalDirector;
                if(tmdb.poster_path) m.poster_path = tmdb.poster_path;
            }
            
            if (directorHtml === "N/D" && m.director && m.director !== "N/D") {
                directorHtml = m.director;
            }

            let listMovie = currentMovieArray.find(x => String(x.id) === String(id));
            if (listMovie) {
                listMovie.release_date = finalDate || listMovie.release_date;
                if(tmdb.poster_path) listMovie.poster_path = tmdb.poster_path;
            }
            
            let rawCastArray = [];
            if (tmdb.credits?.cast && tmdb.credits.cast.length > 0) rawCastArray = tmdb.credits.cast.slice(0, 10);
            else if (isTV && tmdb.aggregate_credits?.cast && tmdb.aggregate_credits.cast.length > 0) rawCastArray = tmdb.aggregate_credits.cast.slice(0, 10);

            let castHtmlDesktop = '<div class="actor-scroll-box">';
            if (rawCastArray.length === 0) {
                castHtmlDesktop += '<span style="color:#bbb; font-size:0.8rem;">N/D</span>';
            } else {
                rawCastArray.forEach(a => {
                    const imgPath = a.profile_path ? `https://image.tmdb.org/t/p/w185${a.profile_path}` : 'https://via.placeholder.com/185x278/111/f5c518?text=NO+FOTO';
                    castHtmlDesktop += `<div class="actor-scroll-card" onclick="openActorDetails(${a.id})"><img src="${imgPath}" class="actor-pic" loading="lazy"><div class="cast-name-overlay">${a.name}</div></div>`;
                });
            }
            castHtmlDesktop += '</div>';
            
            const post = m.poster_path ? (m.poster_path.startsWith('/') ? `https://image.tmdb.org/t/p/w500${m.poster_path}` : m.poster_path) : 'https://via.placeholder.com/500x750?text=Ricerca...';
            
            document.getElementById('main-db-view').style.display = 'none';
            if(document.getElementById('main-tv-view')) document.getElementById('main-tv-view').style.display = 'none';
            document.getElementById('actor-view').style.display = 'none';
            
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.getElementById('tab-database').classList.add('active');

            const dv = document.getElementById('detail-view'); dv.style.display = 'block'; dv.innerHTML = '';
            
            const b = document.createElement('button'); b.className = 'btn-back'; b.textContent = '← TORNA'; 
            b.onclick = () => { 
                dv.style.display = 'none'; 
                if (isTVMode) { document.getElementById('main-tv-view').style.display = 'block'; switchTab('tv', document.getElementById('nav-tv')); } 
                else { document.getElementById('main-db-view').style.display = 'block'; switchTab('database', document.getElementById('nav-db')); }
                renderUI(isTVMode); 
                setTimeout(() => window.scrollTo(0, lastScrollPos), 10); 
            };
            
            const c = document.createElement('div'); c.className = 'movie-card';
            
            c.innerHTML = `
                <img id="detail-poster-${m.id}" src="${post}" class="detail-main-poster">
                <div class="movie-info">
                    <div class="movie-title-frame"><h2>${m.title}</h2></div>
                    <div id="rating-container-${m.id}" style="min-height: 24px; margin-bottom: 10px;"></div>
                    <span class="data-label">Uscita ${isTV ? '(Prima TV)' : '(Cinema IT)'}</span><span class="data-value" style="color:var(--gold); font-weight:bold;">${m.release_date ? m.release_date.split('-').reverse().join('/') : 'N/D'} ${tvStatusHtml}</span>
                    <span class="data-label">Produzione</span><span class="data-value">${m.paese}</span>
                    <span class="data-label">Genere</span><span class="data-value">${m.genres}</span>
                    ${tvStructureHtml}
                    <span class="data-label">${m.isTV ? 'Ideatore' : 'Regia'}</span><span class="data-value">${directorHtml}</span>
                    <span class="data-label">Cast Principale</span>${castHtmlDesktop}
                    <div id="streaming-providers-${m.id}"></div>
                    <div class="plot-box">${m.overview || "Nessuna trama disponibile."}</div>
                    <button class="btn-trailer" onclick="window.open('https://www.youtube.com/results?search_query=Trailer+ita+${encodeURIComponent(m.title)}','_blank')">▶ TRAILER</button>
                </div>
            `;
            
            const s = document.createElement('button'); s.className = 'btn-save'; s.textContent = '💾 SALVA CLOUD'; 
            s.onclick = () => { 
                let finalPoster = m.poster_path ? (m.poster_path.startsWith('/') ? `https://image.tmdb.org/t/p/w300${m.poster_path}` : m.poster_path) : 'https://via.placeholder.com/300x450?text=No+Poster';
                saveToWL(m.id, m.title, finalPoster, m.release_date, m.isTV); 
            };
            c.querySelector('.movie-info').appendChild(s); dv.append(b, c); window.scrollTo(0, 0);

            const ratingContainer = document.getElementById(`rating-container-${m.id}`);
            const detailImg = document.getElementById(`detail-poster-${m.id}`);
            
            let omdbUrl = '';
            if (tmdb.external_ids && tmdb.external_ids.imdb_id) {
                omdbUrl = `https://www.omdbapi.com/?i=${tmdb.external_ids.imdb_id}&apikey=90f0f88d`;
            } else {
                const year = m.release_date ? m.release_date.split('-')[0] : '';
                omdbUrl = `https://www.omdbapi.com/?t=${encodeURIComponent(m.title)}&y=${year}&apikey=90f0f88d`;
            }

            fetch(omdbUrl).then(r => r.json()).then(data => {
                if (!m.poster_path && data.Poster && data.Poster !== 'N/A') {
                    if (detailImg) detailImg.src = data.Poster; m.poster_path = data.Poster;
                } else if (!m.poster_path && detailImg) {
                    detailImg.src = 'https://via.placeholder.com/500x750?text=No+Poster';
                }

                if (data.imdbRating && data.imdbRating !== 'N/A') {
                    if (ratingContainer) ratingContainer.innerHTML = getStarRatingHtml(data.imdbRating, 'IMDb');
                } else if (tmdb.vote_average) {
                    if (ratingContainer) ratingContainer.innerHTML = getStarRatingHtml(tmdb.vote_average.toFixed(1), 'TMDB');
                }
            }).catch(() => {
                if (!m.poster_path && detailImg) detailImg.src = 'https://via.placeholder.com/500x750?text=No+Poster';
                if (tmdb.vote_average && ratingContainer) ratingContainer.innerHTML = getStarRatingHtml(tmdb.vote_average.toFixed(1), 'TMDB');
            });

            fetch(`https://api.themoviedb.org/3/${fetchType}/${m.id}/watch/providers?api_key=${TMDB_API_KEY}`).then(r => r.json()).then(data => {
                const itData = data.results?.IT; const pContainer = document.getElementById(`streaming-providers-${m.id}`);
                if (pContainer && itData) {
                    let allProviders = [];
                    if (itData.flatrate) allProviders = allProviders.concat(itData.flatrate);
                    if (itData.free) allProviders = allProviders.concat(itData.free);
                    if (itData.ads) allProviders = allProviders.concat(itData.ads);
                    const uniqueProviders = Array.from(new Map(allProviders.map(p => [p.provider_id, p])).values());
                    if (uniqueProviders.length > 0) {
                        const logos = uniqueProviders.map(p => `<img src="https://image.tmdb.org/t/p/w45${p.logo_path}" title="${p.provider_name}" class="provider-logo">`).join('');
                        pContainer.innerHTML = `<span class="data-label" style="color: var(--green); margin-top: 15px; display: block;">📺 IN STREAMING</span><div class="providers-flex">${logos}</div>`;
                    }
                }
            }).catch(() => {});
        }

        async function openActorDetails(personId) {
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('main-db-view').style.display = 'none';
            if(document.getElementById('main-tv-view')) document.getElementById('main-tv-view').style.display = 'none';

            const av = document.getElementById('actor-view');
            av.style.display = 'block';
            av.innerHTML = '<p style="text-align:center; color:var(--gold); margin-top:50px;">Apertura Dossier Personaggio...</p>';
            window.scrollTo(0, 0);

            try {
                const res = await fetch(`https://api.themoviedb.org/3/person/${personId}?api_key=${TMDB_API_KEY}&language=it-IT&append_to_response=combined_credits`);
                const person = await res.json();

                const b = document.createElement('button');
                b.className = 'btn-back';
                b.textContent = '← TORNA ALLA RICERCA';
                b.onclick = () => {
                    av.style.display = 'none';
                    if (isTVMode) { document.getElementById('main-tv-view').style.display = 'block'; switchTab('tv', document.getElementById('nav-tv')); }
                    else { document.getElementById('main-db-view').style.display = 'block'; switchTab('database', document.getElementById('nav-db')); }
                    renderUI(isTVMode);
                    window.scrollTo(0, 0);
                };

                const profilePath = person.profile_path ? `https://image.tmdb.org/t/p/w500${person.profile_path}` : 'https://via.placeholder.com/500x500/111/f5c518?text=NO+FOTO';
                const bio = person.biography || "Nessuna biografia disponibile in italiano.";
                const birthday = person.birthday ? person.birthday.split('-').reverse().join('/') : 'N/D';
                const placeOfBirth = person.place_of_birth || 'N/D';

                let castCredits = person.combined_credits.cast || [];
                let crewCredits = person.combined_credits.crew || [];
                
                let directingCredits = crewCredits.filter(c => c.job === 'Director' || c.job === 'Creator');
                
                let allCredits = [...castCredits, ...directingCredits];
                let uniqueCreditsMap = new Map();
                allCredits.forEach(c => uniqueCreditsMap.set(c.id, c));
                let credits = Array.from(uniqueCreditsMap.values());

                credits.sort((a, b) => {
                    const dateA = a.release_date || a.first_air_date || '1900-01-01';
                    const dateB = b.release_date || b.first_air_date || '1900-01-01';
                    return new Date(dateB) - new Date(dateA);
                });

                let filmographyHtml = '<h3 style="color:var(--gold); font-family:Montserrat; margin-top:10px;">FILMOGRAFIA COMPLETA</h3>';
                filmographyHtml += '<div class="movies-grid">';
                
                credits.forEach(c => {
                    const isTV = c.media_type === 'tv';
                    const title = isTV ? c.name : c.title;
                    const dateStr = c.release_date || c.first_air_date || '';
                    const year = dateStr ? dateStr.split('-')[0] : 'N/D';
                    const poster = c.poster_path ? `https://image.tmdb.org/t/p/w300${c.poster_path}` : 'https://via.placeholder.com/300x450/111/fff?text=NO+POSTER';
                    const icon = isTV ? '📺' : '🎥';
                    
                    const roleText = c.character ? `Cast: ${c.character}` : (c.job ? `Ruolo: ${c.job}` : '');
                    const characterHtml = roleText ? `<div style="font-size:0.6rem; color:#888; text-align:center; padding-bottom:5px; padding-left:4px; padding-right:4px;">${roleText}</div>` : '';

                    filmographyHtml += `
                        <div class="grid-item" onclick="openDetailsFromActor(${c.id}, ${isTV})">
                            <div class="movie-badge">${year}</div>
                            <div class="type-badge">${icon}</div>
                            <img src="${poster}" class="grid-poster" loading="lazy">
                            <div class="grid-title">${title}</div>
                            ${characterHtml}
                        </div>
                    `;
                });
                filmographyHtml += '</div>';

                const header = document.createElement('div');
                header.className = 'actor-profile-header'; 
                header.innerHTML = `
                    <img src="${profilePath}" class="actor-avatar">
                    <div class="actor-details">
                        <h2 class="actor-name">${person.name}</h2>
                        <div class="actor-meta">Data di nascita: ${birthday} &nbsp;&bull;&nbsp; Luogo: ${placeOfBirth}</div>
                        <div class="actor-bio">${bio}</div>
                    </div>
                `;

                av.innerHTML = '';
                av.appendChild(b);
                av.appendChild(header);
                
                const creditsDiv = document.createElement('div');
                creditsDiv.innerHTML = filmographyHtml;
                av.appendChild(creditsDiv);

            } catch(e) {
                av.innerHTML = '<p style="color:red; text-align:center;">Errore caricamento dossier attore.</p>';
            }
        }

        function openDetailsFromActor(id, isTV) {
             document.getElementById('actor-view').style.display = 'none';
             openDetails(id, isTV);
        }

        function switchTab(t, el) { 
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active')); 
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active')); 
            document.getElementById('tab-' + t).classList.add('active'); 
            if(el) el.classList.add('active'); 
            isTVMode = (t === 'tv');
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('actor-view').style.display = 'none';
            document.getElementById('main-db-view').style.display = 'block';
            if(document.getElementById('main-tv-view')) document.getElementById('main-tv-view').style.display = 'block';
            if(t === 'watchlist') renderWatchlist(); 
            window.scrollTo(0, 0); 
        }

        async function saveToWL(id, title, poster, date, isTV) { 
            const s = String(id); const isSeries = isTV || false;
            let i = currentVault.findIndex(x => String(x.id) === s && (x.isTV || false) === isSeries); 
            if(i !== -1) { currentVault[i].date = date || 'N/D'; currentVault[i].poster = poster; } 
            else { currentVault.unshift({id: s, title, poster, date: date || 'N/D', isTV: isSeries}); } 
            await saveToCloud(); alert("Aggiunto ai Preferiti!"); 
        }
        
        function renderWatchlist() { 
            const c = document.getElementById('watchlistContainer'); 
            if(currentVault.length === 0) { c.innerHTML = '<p style="text-align:center; color:#555; margin-top:50px;">Nessun preferito.</p>'; return; } 
            c.innerHTML = currentVault.map(m => `<div class="wl-item"><img src="${m.poster}" class="wl-poster" onclick="viewFromVault('${m.id}', ${m.isTV || false})"><div class="wl-content" onclick="viewFromVault('${m.id}', ${m.isTV || false})"><div style="font-weight:700;">${m.isTV ? '📺 ' : ''}${m.title}</div><div style="font-size:0.75rem; color:var(--gold);">📅 ${m.date ? m.date.split('-').reverse().join('/') : 'N/D'}</div></div><button class="btn-delete-wl" onclick="removeWL('${m.id}', ${m.isTV || false})">X</button></div>`).join(''); 
        }
        
        function viewFromVault(id, isTV) { 
            if (isTV) { switchTab('tv', document.getElementById('nav-tv')); } 
            else { switchTab('database', document.getElementById('nav-db')); }
            openDetails(id, isTV); 
        }
        
        async function removeWL(id, isTV) { 
            if(confirm("Rimuovere dai preferiti?")) { 
                const isSeries = isTV || false;
                currentVault = currentVault.filter(x => !(String(x.id) === String(id) && (x.isTV || false) === isSeries)); 
                renderWatchlist(); await saveToCloud(); 
            } 
        }

        function toggleSort(m) { currentSortMode = m; renderUI(isTVMode); }
        function toggleView(m) { currentViewMode = m; renderUI(isTVMode); }
    </script>
</body>
</html>
