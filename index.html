<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Athena Lab V8.2 Cloud</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <style>
        :root { --bg-dark: #0f0f0f; --gold: #f5c518; --green: #2ecc71; --text: #fff; }
        body { background: var(--bg-dark); color: var(--text); font-family: sans-serif; margin: 0; text-align: center; }
        .status-bar { background: #1a1a1a; padding: 10px; font-size: 0.8rem; color: var(--gold); border-bottom: 1px solid #333; }
        .btn-sync { background: var(--gold); border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="syncStatus" class="status-bar">IN ATTESA DI AUTENTICAZIONE DRIVE...</div>
    
    <h1>ATHENA LAB V8.2</h1>
    <p>Sincronizzazione Cloud con "Cinema Lab cassaforte"</p>
    
    <button id="loginBtn" class="btn-sync" onclick="handleAuthClick()">ACCEDI A GOOGLE DRIVE</button>

    <script>
        const CLIENT_ID = '62527185116-dvsbjccvpib45bu7k3are8aeekadas3v.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';
        const FOLDER_NAME = "Cinema Lab cassaforte";
        const FILE_NAME = "athena_vault.json";

        let accessToken = null;
        let vaultFileId = null;

        function updateStatus(msg) { document.getElementById('syncStatus').innerText = msg; }

        // 1. Inizializzazione API
        async function intializeGapiClient() {
            await gapi.client.init({
                discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"],
            });
        }

        function handleAuthClick() {
            const tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: async (resp) => {
                    if (resp.error) return;
                    accessToken = resp.access_token;
                    document.getElementById('loginBtn').style.display = 'none';
                    await startCloudSync();
                },
            });
            tokenClient.requestAccessToken();
        }

        async function startCloudSync() {
            updateStatus("Ricerca cartella in corso...");
            try {
                await gapi.client.load('drive', 'v3');
                
                // Cerca la cartella
                const folderResp = await gapi.client.drive.files.list({
                    q: `name='${FOLDER_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false`
                });

                let folderId;
                if (folderResp.result.files.length > 0) {
                    folderId = folderResp.result.files[0].id;
                } else {
                    updateStatus("Creazione cartella 'Cinema Lab cassaforte'...");
                    const folder = await gapi.client.drive.files.create({
                        resource: { name: FOLDER_NAME, mimeType: 'application/vnd.google-apps.folder' },
                        fields: 'id'
                    });
                    folderId = folder.result.id;
                }

                // Cerca il file
                const fileResp = await gapi.client.drive.files.list({
                    q: `name='${FILE_NAME}' and '${folderId}' in parents and trashed=false`
                });

                if (fileResp.result.files.length > 0) {
                    vaultFileId = fileResp.result.files[0].id;
                    updateStatus("Cloud Sincronizzato ✓");
                } else {
                    updateStatus("Inizializzazione Cassaforte...");
                    await createInitialFile(folderId);
                    updateStatus("Cloud Sincronizzato ✓");
                }
            } catch (err) {
                updateStatus("Errore: " + err.message);
            }
        }

        async function createInitialFile(folderId) {
            const boundary = 'foo_bar_baz';
            const metadata = { name: FILE_NAME, parents: [folderId], mimeType: 'application/json' };
            const content = JSON.stringify([]);
            const multipartRequestBody = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${content}\r\n--${boundary}--`;

            await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                method: 'POST',
                headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': `multipart/related; boundary=${boundary}` },
                body: multipartRequestBody
            });
        }

        window.onload = () => { gapi.load('client', intializeGapiClient); };
    </script>
</body>
</html>
