<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Athena Lab V9.0 Ibrida</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>

    <style>
        :root { --bg-dark: #0f0f0f; --gold: #f5c518; --red: #e74c3c; --green: #2ecc71; --text-light: #fff; --text-muted: #bbb; --card-bg: rgba(255, 255, 255, 0.05); }
        body { background-color: var(--bg-dark); color: var(--text-light); font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 40px; -webkit-font-smoothing: antialiased; }
        
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .sync-status { font-size: 0.65rem; color: var(--gold); padding: 5px; background: #000; text-align: center; border-bottom: 1px solid #333; }

        .sticky-header { position: sticky; top: 0; z-index: 1000; background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(10px); border-bottom: 2px solid var(--gold); }
        .header-title { padding: 15px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        .header-title h1 { color: var(--gold); font-size: 1.5rem; font-weight: 900; margin: 0; font-family: 'Montserrat'; }
        
        .db-status { font-size: 0.65rem; padding: 5px 10px; border-radius: 12px; background: #222; font-weight: 800; cursor: pointer; border: 1px solid #444; text-transform: uppercase; }
        .db-status.green { border-color: var(--green); color: var(--green); }
        .db-status.red { border-color: var(--red); color: var(--red); }

        .top-nav { display: flex; justify-content: space-around; padding: 10px 0; }
        .nav-item { color: #fff; text-align: center; font-family: 'Montserrat'; font-size: 0.85rem; font-weight: 900; flex: 1; cursor: pointer; padding: 5px 0; }
        .nav-item.active { color: var(--gold); }
        .tab-content { display: none; padding: 20px; animation: fadeIn 0.2s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .search-container { display: flex; gap: 8px; margin-bottom: 10px; }
        .search-input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 0.9rem; }
        .btn-filter { background: #333; border: none; padding: 0 15px; border-radius: 10px; font-size: 1.2rem; cursor: pointer; color: white; }
        .btn-search { background: var(--gold); border: none; padding: 0 20px; border-radius: 10px; font-weight: 900; cursor: pointer; color: #000; }
        
        .filters-panel { display: none; background: rgba(255,255,255,0.02); padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #333; }
        .filters-panel.active { display: flex; gap: 10px; flex-wrap: wrap; }
        .filter-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 80px; }
        .filter-group label { font-size: 0.7rem; color: var(--gold); font-weight: bold; }
        .filter-group input { padding: 8px; background: #121212; border: 1px solid #444; color: white; border-radius: 6px; font-size: 0.8rem; }
        
        input::-webkit-calendar-picker-indicator { opacity: 0.5; filter: invert(1); cursor: pointer; }

        .btn-now-playing { width: 100%; padding: 15px; border-radius: 12px; border: none; background: linear-gradient(45deg, #f5c518, #d4a815); color: #000; font-family: 'Montserrat'; font-weight: 900; margin-bottom: 10px; cursor: pointer; }
        
        .sort-toggle, .view-toggle { display: flex; background: #1a1a1a; border-radius: 10px; margin-bottom: 10px; border: 1px solid #333; overflow: hidden; }
        .sort-btn, .view-btn { flex: 1; text-align: center; padding: 10px; font-weight: 800; font-size: 0.7rem; color: #666; cursor: pointer; }
        .sort-btn.active, .view-btn.active { background: var(--gold); color: #000; }
        
        .movies-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .grid-item { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); position: relative; cursor: pointer; }
        .grid-poster { width: 100%; display: block; aspect-ratio: 2/3; object-fit: cover; }
        .grid-title { font-size: 0.8rem; font-weight: 700; padding: 8px; text-align: center; }
        .movie-badge { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.8); color: var(--gold); font-size: 0.65rem; font-weight: 900; padding: 3px 6px; border-radius: 4px; border: 1px solid var(--gold); backdrop-filter: blur(5px); }
        .list-item { background: #1a1a1a; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; margin-bottom: 6px; cursor: pointer; }
        .list-data-dynamic { color: var(--gold); font-size: 0.75rem; font-weight: 900; font-family: 'Montserrat'; text-align: right; }
        
        .btn-back { background: #333; color: #fff; width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 800; margin-bottom: 15px; font-size: 0.85rem; cursor: pointer; }
        .movie-card { background: var(--card-bg); border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .movie-info { padding: 20px; }
        .data-label { color: var(--gold); font-weight: 900; font-family: 'Montserrat'; font-size: 0.75rem; text-transform: uppercase; margin-top: 15px; display: block; }
        .data-value { color: #fff; font-size: 0.95rem; display: block; margin-top: 4px; line-height: 1.4; }
        .btn-save { background: var(--green); color: #000; width: 100%; padding: 15px; border-radius: 12px; font-weight: 900; border: none; margin-top: 10px; cursor: pointer; }
        .btn-trailer { background: #ff0000; color: #fff; width: 100%; padding: 15px; border-radius: 12px; font-weight: 900; border: none; margin-top: 25px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; }
        
        .wl-item { display: flex; align-items: center; background: #1a1a1a; padding: 12px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #333; }
        .wl-poster { width: 50px; height: 75px; border-radius: 6px; margin-right: 15px; object-fit: cover; cursor: pointer; }
        .wl-content { flex: 1; cursor: pointer; }
        .btn-delete-wl { background: rgba(231, 76, 60, 0.1); color: var(--red); border: 1px solid var(--red); padding: 8px 12px; border-radius: 8px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <h1 style="color: var(--gold); font-family: 'Montserrat'; font-weight: 900; font-size: 2rem;">ATHENA V9.0</h1>
        <p style="margin-bottom: 30px; font-size: 0.9rem; color: #aaa;">Protezione Cloud Attiva</p>
        <button class="btn-search" style="padding: 20px 40px; font-size: 1rem;" onclick="handleAuthClick()">ENTRA NELLA CASSAFORTE</button>
    </div>

    <div id="syncIndicator" class="sync-status">ATTESA CONNESSIONE DRIVE...</div>

    <div class="sticky-header">
        <div class="header-title">
            <h1>ATHENA LAB</h1>
            <div id="dbStatus" class="db-status red" onclick="document.getElementById('fileInput').click()">
                🔴 DB: Assente (Solo TMDB)
            </div>
            <input type="file" id="fileInput" accept=".json" style="display: none;" onchange="loadLocalDatabase(event)">
        </div>
        <div class="top-nav">
            <div id="nav-db" class="nav-item active" onclick="switchTab('database', this)">🔍 DATABASE</div>
            <div id="nav-cinema" class="nav-item" onclick="switchTab('cinema', this)">🎟️ IN SALA</div>
            <div id="nav-wl" class="nav-item" onclick="switchTab('watchlist', this)">💾 CASSAFORTE</div>
        </div>
    </div>

    <div id="tab-database" class="tab-content active">
        <div id="main-db-view">
            <div class="search-container">
                <input type="text" id="manualSearch" class="search-input" placeholder="Cerca titolo, regista o attore..." onkeypress="if(event.key === 'Enter') searchManual()">
                <button class="btn-filter" onclick="toggleFilters()">⚙️</button>
                <button class="btn-search" onclick="searchManual()">GO</button>
            </div>
            
            <div id="filtersPanel" class="filters-panel">
                <div class="filter-group">
                    <label>Dal (Data)</label>
                    <input type="text" id="filterYearFrom" placeholder="gg/mm/aaaa" onkeypress="if(event.key === 'Enter') searchManual()">
                </div>
                <div class="filter-group">
                    <label>Al (Data)</label>
                    <input type="text" id="filterYearTo" placeholder="gg/mm/aaaa" onkeypress="if(event.key === 'Enter') searchManual()">
                </div>
                <div class="filter-group">
                    <label>Paese</label>
                    <input type="text" id="filterCountry" list="countryList" placeholder="Es. digita le prime lettere..." onkeypress="if(event.key === 'Enter') searchManual()">
                    <datalist id="countryList"></datalist>
                </div>
            </div>

            <button class="btn-now-playing" onclick="fetchTimeMachine()">🎬 TIME MACHINE (400 TITOLI - 180GG)</button>
            <div id="resultsContainer"></div>
        </div>
        <div id="detail-view" style="display:none;"></div>
    </div>

    <div id="tab-cinema" class="tab-content">
        <button class="btn-search" style="background:var(--red); color:#fff; width:100%; padding:15px; border-radius:12px; border:none; font-weight:800; margin-bottom: 20px;" onclick="window.open('https://www.google.com/search?q=cinema+vicino+a+me+orari','_blank')">📍 CINEMA VICINO A ME (GPS)</button>
        <h3 style="color: #fff; margin: 20px 0 10px; font-size: 0.9rem; text-align: center; font-family: 'Montserrat';">I TUOI PREFERITI</h3>
        <div style="display:grid; gap:10px;">
            <button onclick="window.open('https://www.facebook.com/supercinemacastello/#','_blank')" style="background:#1a1a1a; color:var(--gold); border:1px solid var(--gold); padding:12px; border-radius:10px; font-weight:800;">🍿 SUPERCINEMA (Fondi)</button>
            <button onclick="window.open('https://www.facebook.com/cinemaugusto/','_blank')" style="background:#1a1a1a; color:var(--gold); border:1px solid var(--gold); padding:12px; border-radius:10px; font-weight:800;">🍿 AUGUSTO (Sperlonga)</button>
            <button onclick="window.open('https://www.cinemateatrotraiano.it/','_blank')" style="background:#1a1a1a; color:var(--gold); border:1px solid var(--gold); padding:12px; border-radius:10px; font-weight:800;">🍿 TRAIANO (Terracina)</button>
            <button onclick="window.open('https://www.riocinemamultisala.com/','_blank')" style="background:#1a1a1a; color:var(--gold); border:1px solid var(--gold); padding:12px; border-radius:10px; font-weight:800;">🍿 RIO (Terracina)</button>
            <button onclick="window.open('https://www.aristongaeta.it/programmazione-cinema/','_blank')" style="background:#1a1a1a; color:var(--gold); border:1px solid var(--gold); padding:12px; border-radius:10px; font-weight:800;">🍿 ARISTON (Gaeta)</button>
            <button onclick="window.open('https://multisaladelmare.18tickets.it/','_blank')" style="background:#1a1a1a; color:var(--gold); border:1px solid var(--gold); padding:12px; border-radius:10px; font-weight:800;">🍿 DEL MARE (Formia)</button>
        </div>
    </div>

    <div id="tab-watchlist" class="tab-content"><div id="watchlistContainer"></div></div>

    <script>
        const CLIENT_ID = '62527185116-dvsbjccvpib45bu7k3are8aeekadas3v.apps.googleusercontent.com';
        const FOLDER_NAME = "Cinema Lab cassaforte";
        const FILE_NAME = "athena_vault.json";
        const TMDB_API_KEY = "e2d58e4dfdd0a14cdce19d08d49bb21e";
        
        let accessToken = null, vaultFileId = null;
        let currentVault = []; 
        let currentMovieArray = [], currentSortMode = 'recent', currentViewMode = 'list';
        let lastScrollPos = 0;

        let localDB = [];

        function initLocalDB() {
            const request = indexedDB.open("AthenaVaultDB", 1);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains("json_store")) {
                    db.createObjectStore("json_store", { keyPath: "id" });
                }
            };
            request.onsuccess = (e) => {
                const db = e.target.result;
                const tx = db.transaction("json_store", "readonly");
                const store = tx.objectStore("json_store");
                const getReq = store.get("master_db");
                getReq.onsuccess = (ev) => {
                    if (ev.target.result) {
                        localDB = ev.target.result.data;
                        updateDbStatus();
                        populateCountryDropdown();
                    }
                };
            };
        }
        initLocalDB();

        function loadLocalDatabase(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    localDB = JSON.parse(e.target.result);
                    const request = indexedDB.open("AthenaVaultDB", 1);
                    request.onsuccess = (ev) => {
                        const db = ev.target.result;
                        const tx = db.transaction("json_store", "readwrite");
                        const store = tx.objectStore("json_store");
                        store.put({ id: "master_db", data: localDB });
                        tx.oncomplete = () => {
                            updateDbStatus();
                            populateCountryDropdown();
                            alert("✅ Database memorizzato permanentemente nel Caveau del browser!");
                        };
                    };
                } catch (err) {
                    alert("❌ Errore nella lettura del file JSON.");
                }
            };
            reader.readAsText(file);
        }

        function updateDbStatus() {
            const statusDiv = document.getElementById("dbStatus");
            if (localDB.length === 0) {
                statusDiv.className = "db-status red";
                statusDiv.innerHTML = "🔴 DB: Assente (Solo TMDB)";
                return;
            }
            
            let maxDate = "01/01/1900";
            
            // Funzione interna per confrontare date gg/mm/aaaa
            const toDateObj = (s) => {
                if(!s || !s.includes('/')) return new Date(0);
                const p = s.split('/');
                return new Date(p[2], p[1]-1, p[0]);
            };

            localDB.forEach(m => {
                if (m.release_date && toDateObj(m.release_date) > toDateObj(maxDate)) maxDate = m.release_date;
            });
            
            const maxDateObj = toDateObj(maxDate);
            const today = new Date();
            const diffTime = today.getTime() - maxDateObj.getTime();
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays <= 21) {
                statusDiv.className = "db-status green";
                statusDiv.innerHTML = `🟢 DB Allineato (${maxDate})`;
            } else {
                statusDiv.className = "db-status red";
                statusDiv.innerHTML = `🔴 Aggiorna DB (${maxDate})`;
            }
        }

        function populateCountryDropdown() {
            if (localDB.length === 0) return;
            const countrySet = new Set();
            localDB.forEach(m => {
                if (m.paese && m.paese !== "N/D") {
                    m.paese.split(',').forEach(c => {
                        const trimmed = c.trim();
                        if (trimmed) countrySet.add(trimmed);
                    });
                }
            });
            const dataList = document.getElementById('countryList');
            dataList.innerHTML = ''; 
            Array.from(countrySet).sort().forEach(c => {
                const option = document.createElement('option');
                option.value = c;
                dataList.appendChild(option);
            });
        }

        function toggleFilters() {
            document.getElementById("filtersPanel").classList.toggle("active");
        }

        function updateStatus(msg) { document.getElementById('syncIndicator').innerText = msg; }

        async function intializeGapiClient() {
            await gapi.client.init({ discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"] });
        }

        window.onload = () => { gapi.load('client', intializeGapiClient); };

        function handleAuthClick() {
            const tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID, scope: 'https://www.googleapis.com/auth/drive.file',
                callback: async (resp) => {
                    if (resp.error) return;
                    accessToken = resp.access_token;
                    document.getElementById('loginOverlay').style.display = 'none';
                    await startCloudSync();
                },
            });
            tokenClient.requestAccessToken();
        }

        async function startCloudSync() {
            updateStatus("Sincronizzazione Cloud in corso...");
            try {
                await gapi.client.load('drive', 'v3');
                const folderResp = await gapi.client.drive.files.list({ q: `name='${FOLDER_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false` });
                let folderId;
                if (folderResp.result.files.length > 0) {
                    folderId = folderResp.result.files[0].id;
                } else {
                    const fMetadata = { name: FOLDER_NAME, mimeType: 'application/vnd.google-apps.folder' };
                    const folder = await gapi.client.drive.files.create({ resource: fMetadata, fields: 'id' });
                    folderId = folder.result.id;
                }
                const fileResp = await gapi.client.drive.files.list({ q: `name='${FILE_NAME}' and '${folderId}' in parents and trashed=false` });
                if (fileResp.result.files.length > 0) {
                    vaultFileId = fileResp.result.files[0].id;
                    const response = await fetch(`https://www.googleapis.com/drive/v3/files/${vaultFileId}?alt=media`, { headers: { Authorization: `Bearer ${accessToken}` } });
                    currentVault = await response.json();
                } else {
                    const boundary = 'foo_bar_baz';
                    const metadata = { name: FILE_NAME, parents: [folderId], mimeType: 'application/json' };
                    const body = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify([])}\r\n--${boundary}--`;
                    await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                        method: 'POST', headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': `multipart/related; boundary=${boundary}` }, body: body
                    });
                    const checkResp = await gapi.client.drive.files.list({ q: `name='${FILE_NAME}' and trashed=false` });
                    vaultFileId = checkResp.result.files[0].id;
                }
                updateStatus("Cloud Sincronizzato ✓");
                if(document.getElementById('tab-watchlist').classList.contains('active')) renderWatchlist();
            } catch (e) { updateStatus("Errore Sync Cloud"); }
        }

        async function saveToCloud() {
            const boundary = 'foo_bar_baz';
            const metadata = { name: FILE_NAME, mimeType: 'application/json' };
            const body = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(currentVault)}\r\n--${boundary}--`;
            await fetch(`https://www.googleapis.com/upload/drive/v3/files/${vaultFileId}?uploadType=multipart`, {
                method: 'PATCH', headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': `multipart/related; boundary=${boundary}` }, body: body
            });
            updateStatus("Cloud Sincronizzato ✓");
        }

        async function fetchTimeMachine() {
            const resultsContainer = document.getElementById('resultsContainer');
            resultsContainer.innerHTML = '<p style="text-align:center; color:#f5c518;">Viaggio nel tempo (180gg/400 Titoli)...</p>';
            const today = new Date(), past = new Date();
            past.setDate(today.getDate() - 180);
            const pStr = past.toISOString().split('T')[0], fStr = new Date(today.getTime() + 21*24*60*60*1000).toISOString().split('T')[0];
            try {
                const baseUrl = `https://api.themoviedb.org/3/discover/movie?api_key=${TMDB_API_KEY}&language=it-IT&region=IT&release_date.gte=${pStr}&release_date.lte=${fStr}&with_release_type=2|3`;
                const responses = await Promise.all([...Array(20).keys()].map(p => fetch(`${baseUrl}&page=${p+1}`)));
                const datasets = await Promise.all(responses.map(r => r.json()));
                let combined = []; datasets.forEach(d => { if(d.results) combined = combined.concat(d.results); });
                const cutoffDate = new Date(); cutoffDate.setDate(cutoffDate.getDate() - 180);
                combined = combined.filter(m => m.release_date && new Date(m.release_date) >= cutoffDate);
                currentMovieArray = Array.from(new Map(combined.map(m => [m.id, m])).values());
                renderUI();
            } catch (e) { resultsContainer.innerHTML = '<p style="text-align:center; color:var(--red);">Errore scanner.</p>'; }
        }

        async function searchManual() {
            const query = document.getElementById('manualSearch').value.toLowerCase().trim();
            const yearFrom = document.getElementById('filterYearFrom').value.trim();
            const yearTo = document.getElementById('filterYearTo').value.trim();
            let country = document.getElementById('filterCountry').value.toLowerCase().trim();
            
            if (country === 'italy') country = 'italia';
            if (country === 'usa' || country === 'america') country = 'stati uniti';
            
            const resultsContainer = document.getElementById('resultsContainer');
            if(!query && !yearFrom && !yearTo && !country) return;
            
            resultsContainer.innerHTML = '<p style="text-align:center; color:#f5c518;">Ricerca in corso...</p>';
            
            // FUNZIONE DI CONVERSIONE CHIRURGICA PER COMPARAZIONE GG/MM/AAAA
            const toCompNum = (s) => {
                if(!s || !s.includes('/')) return null;
                const p = s.split('/');
                return parseInt(p[2] + p[1].padStart(2,'0') + p[0].padStart(2,'0'));
            };

            if (localDB.length > 0) {
                const fromNum = toCompNum(yearFrom);
                const toNum = toCompNum(yearTo);

                let results = localDB.filter(m => {
                    const matchText = !query || 
                        (m.title && m.title.toLowerCase().includes(query)) || 
                        (m.cast && m.cast.toLowerCase().includes(query)) || 
                        (m.director && m.director.toLowerCase().includes(query));
                    
                    const movieNum = toCompNum(m.release_date);
                    const matchDate = (!fromNum || movieNum >= fromNum) && (!toNum || movieNum <= toNum);
                    const matchCountry = !country || (m.paese && m.paese.toLowerCase().includes(country));
                    
                    return matchText && matchDate && matchCountry;
                });
                
                if (results.length > 0) {
                    if(results.length > 100) {
                        currentMovieArray = results.slice(0, 100);
                        renderUI();
                        resultsContainer.innerHTML += `<p style="text-align:center; color:#aaa; font-size:0.8rem; margin-top:20px; padding:10px;">Mostrati 100 risultati su ${results.length} totali.<br>Usa i filtri per una ricerca più specifica.</p>`;
                    } else {
                        currentMovieArray = results;
                        renderUI();
                    }
                    return;
                }
                
                if (yearFrom || yearTo || country) {
                    currentMovieArray = [];
                    renderUI();
                    resultsContainer.innerHTML = '<p style="text-align:center; color:#fff;">Nessun risultato nel Caveau locale con questi parametri.</p>';
                    return;
                }
            }

            try {
                if (query) {
                    const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&language=it-IT&region=IT&query=${encodeURIComponent(query)}`);
                    const data = await res.json();
                    if (data.results && data.results.length > 0) {
                        currentMovieArray = data.results;
                        renderUI();
                    } else {
                        const pRes = await fetch(`https://api.themoviedb.org/3/search/person?api_key=${TMDB_API_KEY}&language=it-IT&query=${encodeURIComponent(query)}`);
                        const pData = await pRes.json();
                        if (pData.results && pData.results.length > 0) {
                            const mRes = await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${TMDB_API_KEY}&language=it-IT&region=IT&with_cast=${pData.results[0].id}&sort_by=release_date.desc`);
                            const mData = await mRes.json();
                            currentMovieArray = mData.results || [];
                            renderUI();
                        } else {
                            currentMovieArray = [];
                            renderUI();
                            resultsContainer.innerHTML = '<p style="text-align:center; color:#fff;">Nessun risultato trovato neanche online.</p>';
                        }
                    }
                } else {
                    let discoverUrl = `https://api.themoviedb.org/3/discover/movie?api_key=${TMDB_API_KEY}&language=it-IT&region=IT&sort_by=release_date.desc`;
                    const res = await fetch(discoverUrl);
                    const data = await res.json();
                    currentMovieArray = data.results || [];
                    renderUI();
                }
            } catch (e) { resultsContainer.innerHTML = '<p style="text-align:center; color:var(--red);">Errore di rete TMDB.</p>'; }
        }

        function renderUI() {
            const resultsContainer = document.getElementById('resultsContainer');
            currentMovieArray.sort((a, b) => {
                const toDateObj = (s) => {
                    if(!s || !s.includes('/')) return new Date(0);
                    const p = s.split('/');
                    return new Date(p[2], p[1]-1, p[0]);
                };
                return currentSortMode === 'recent' ? toDateObj(b.release_date) - toDateObj(a.release_date) : (b.popularity || 0) - (a.popularity || 0);
            });
            
            let html = `<div class="sort-toggle"><div class="sort-btn ${currentSortMode === 'recent' ? 'active' : ''}" onclick="toggleSort('recent')">📅 RECENTI</div><div class="sort-btn ${currentSortMode === 'popular' ? 'active' : ''}" onclick="toggleSort('popular')">🔥 POPOLARITÀ</div></div><div class="view-toggle"><div class="view-btn ${currentViewMode === 'grid' ? 'active' : ''}" onclick="toggleView('grid')">🖼️ GRIGLIA</div><div class="view-btn ${currentViewMode === 'list' ? 'active' : ''}" onclick="toggleView('list')">📄 ELENCO</div></div>`;
            
            if (currentViewMode === 'grid') {
                html += `<div class="movies-grid">`;
                currentMovieArray.forEach(m => {
                    const badge = currentSortMode === 'popular' ? `🔥 ${Math.round(m.popularity)}` : (m.release_date || 'N/D');
                    const posterUrl = m.poster_path ? (m.poster_path.startsWith('/') ? `https://image.tmdb.org/t/p/w300${m.poster_path}` : m.poster_path) : 'https://via.placeholder.com/300x450?text=No+Poster';
                    html += `<div class="grid-item" onclick="openDetails(${m.id})"><div class="movie-badge">${badge}</div><img src="${posterUrl}" class="grid-poster"><div class="grid-title">${m.title}</div></div>`;
                });
                html += `</div>`;
            } else {
                html += `<div class="list-view-container">`;
                currentMovieArray.forEach(m => { 
                    const dataField = currentSortMode === 'popular' ? `🔥 ${Math.round(m.popularity)}` : (m.release_date || 'N/D');
                    html += `<div class="list-item" onclick="openDetails(${m.id})"><div class="list-title">${m.title}</div><div class="list-data-dynamic">${dataField}<br><span style="font-size:0.6rem; color:#888;">${m.paese || ''}</span></div></div>`; 
                });
                html += `</div>`;
            }
            resultsContainer.innerHTML = html;
        }

        async function openDetails(id) {
            lastScrollPos = window.scrollY;
            let m;
            const localMatch = localDB.find(x => String(x.id) === String(id));
            if (localMatch) {
                m = {
                    id: localMatch.id,
                    title: localMatch.title,
                    poster_path: localMatch.poster_path,
                    release_date: localMatch.release_date,
                    popularity: localMatch.popularity,
                    overview: localMatch.overview,
                    paese: localMatch.paese || "N/D",
                    genres: localMatch.genres || "N/D",
                    director: localMatch.director || "N/D",
                    cast: localMatch.cast || "N/D"
                };
            } else {
                document.getElementById('resultsContainer').innerHTML = '<p style="text-align:center; color:#f5c518;">Recupero dettagli online...</p>';
                const res = await fetch(`https://api.themoviedb.org/3/movie/${id}?api_key=${TMDB_API_KEY}&language=it-IT&append_to_response=credits`);
                const tmdbData = await res.json();
                renderUI(); 
                m = {
                    id: tmdbData.id,
                    title: tmdbData.title,
                    poster_path: tmdbData.poster_path,
                    release_date: tmdbData.release_date,
                    popularity: tmdbData.popularity,
                    overview: tmdbData.overview,
                    paese: tmdbData.production_countries?.map(c => c.name).join(', ') || "N/D",
                    genres: tmdbData.genres?.map(g => g.name).join(', ') || "N/D",
                    director: tmdbData.credits?.crew?.find(p => p.job === 'Director')?.name || "N/D",
                    cast: tmdbData.credits?.cast?.slice(0, 5).map(a => a.name).join(', ') || "N/D"
                };
            }
            const poster = m.poster_path ? (m.poster_path.startsWith('/') ? `https://image.tmdb.org/t/p/w500${m.poster_path}` : m.poster_path) : 'https://via.placeholder.com/500x750?text=No+Poster';
            const youtubeQuery = `https://www.youtube.com/results?search_query=Trailer+ita+${encodeURIComponent(m.title)}`;
            document.getElementById('main-db-view').style.display = 'none';
            const detailView = document.getElementById('detail-view');
            detailView.style.display = 'block';
            detailView.innerHTML = `
                <button class="btn-back" onclick="closeDetails()">← TORNA ALL'ELENCO</button>
                <div class="movie-card">
                    <img src="${poster}" style="width:100%">
                    <div class="movie-info">
                        <h2>${m.title}</h2>
                        <span class="data-label">Uscita Italia</span><span class="data-value">${m.release_date || 'N/D'}</span>
                        <span class="data-label">Produzione</span><span class="data-value">${m.paese}</span>
                        <span class="data-label">Popolarità</span><span class="data-value">🔥 ${Math.round(m.popularity || 0)}</span>
                        <span class="data-label">Genere</span><span class="data-value">${m.genres}</span>
                        <span class="data-label">Regia</span><span class="data-value">${m.director}</span>
                        <span class="data-label">Cast Principale</span><span class="data-value">${m.cast}</span>
                        <span class="data-label">Sinossi</span><p style="font-size:0.95rem; line-height:1.5;">${m.overview || "Trama non disponibile."}</p>
                        <button class="btn-trailer" onclick="window.open('${youtubeQuery}', '_blank')">▶ GUARDA TRAILER SU YOUTUBE</button>
                        <button onclick="saveToWL('${m.id}','${m.title.replace(/'/g,"\\'")}','${poster}','${m.release_date}')" class="btn-save">💾 SALVA NEL CLOUD</button>
                    </div>
                </div>
            `;
            window.scrollTo(0, 0);
        }

        function closeDetails() {
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('main-db-view').style.display = 'block';
            setTimeout(() => { window.scrollTo(0, lastScrollPos); }, 10);
        }

        function switchTab(t, el) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById('tab-' + t).classList.add('active');
            if(el) el.classList.add('active');
            if(t === 'database') closeDetails();
            if(t === 'watchlist') renderWatchlist();
            window.scrollTo(0, 0);
        }

        async function saveToWL(id, title, poster, date) {
            const strId = String(id);
            const validatedDate = date || 'Data da confermare';
            let existingIdx = currentVault.findIndex(x => String(x.id) === strId);
            if(existingIdx !== -1) {
                if(validatedDate !== 'Data da confermare') currentVault[existingIdx].date = validatedDate;
                alert("Aggiornato nel Cloud!");
            } else {
                currentVault.unshift({id: strId, title, poster, date: validatedDate});
                alert("Salvato nel Cloud!");
            }
            updateStatus("Salvataggio invisibile...");
            await saveToCloud();
        }

        function renderWatchlist() {
            const container = document.getElementById('watchlistContainer');
            if(currentVault.length === 0) { container.innerHTML = '<p style="text-align:center; color:#555; margin-top:50px;">Cassaforte vuota.</p>'; return; }
            container.innerHTML = currentVault.map(m => `
                <div class="wl-item">
                    <img src="${m.poster}" class="wl-poster" onclick="viewFromVault('${m.id}')">
                    <div class="wl-content" onclick="viewFromVault('${m.id}')">
                        <div class="wl-title" style="font-weight:700;">${m.title}</div>
                        <div style="font-size:0.75rem; color:var(--gold); font-weight:700;">📅 ${m.date || 'N/D'}</div>
                    </div>
                    <button class="btn-delete-wl" onclick="removeWL('${m.id}')">X</button>
                </div>
            `).join('');
        }

        function viewFromVault(id) { switchTab('database', document.getElementById('nav-db')); openDetails(id); }
        
        async function removeWL(id) {
            if(confirm("Eliminare definitivamente dal Cloud?")) {
                currentVault = currentVault.filter(x => String(x.id) !== String(id));
                renderWatchlist(); 
                updateStatus("Cancellazione Cloud in corso...");
                try { await saveToCloud(); } catch(e) { alert("Errore di connessione. Modifica non salvata su Drive."); }
            }
        }

        function toggleSort(m) { currentSortMode = m; renderUI(); }
        function toggleView(m) { currentViewMode = m; renderUI(); }
    </script>
</body>
</html>
