<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athena Cinema Radar</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .title { color: #4CAF50; margin: 0; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
        .status-bar { font-size: 14px; font-weight: bold; background: #222; padding: 5px 10px; border-radius: 5px; }
        
        .upload-section { background: #1e1e1e; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #333; }
        .file-input-wrapper { display: flex; gap: 10px; align-items: center; }
        
        .search-panel { background: #1e1e1e; padding: 20px; border-radius: 8px; border: 1px solid #333; margin-bottom: 20px; }
        .search-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .search-input { background: #2d2d2d; border: 1px solid #444; color: white; padding: 10px; border-radius: 4px; width: 100%; box-sizing: border-box; }
        .search-input:focus { outline: none; border-color: #4CAF50; }
        select.search-input { appearance: auto; cursor: pointer; }
        
        .btn-search { background: #4CAF50; color: white; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; transition: background 0.3s; }
        .btn-search:hover { background: #45a049; }
        
        .results-header { margin-top: 30px; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; font-size: 18px; display: flex; justify-content: space-between; }
        
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        
        .movie-card { background: #1e1e1e; border-radius: 8px; overflow: hidden; border: 1px solid #333; cursor: pointer; transition: transform 0.2s, border-color 0.2s; display: flex; flex-direction: column; }
        .movie-card:hover { transform: translateY(-5px); border-color: #4CAF50; }
        .poster-container { position: relative; width: 100%; padding-top: 150%; background: #000; }
        .poster { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .m-title { font-size: 14px; font-weight: bold; margin: 0 0 5px 0; color: #fff; line-height: 1.2; }
        .m-meta { font-size: 12px; color: #aaa; margin: 0; }
        .badge-source { font-size: 10px; padding: 2px 6px; border-radius: 3px; font-weight: bold; margin-top: 5px; display: inline-block; align-self: flex-start; }
        .badge-local { background: #4CAF50; color: #000; }
        .badge-tmdb { background: #E50914; color: #fff; }

        /* MODALE DETTAGLI */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #1e1e1e; width: 90%; max-width: 900px; max-height: 90vh; border-radius: 12px; overflow-y: auto; display: flex; flex-direction: row; border: 1px solid #4CAF50; box-shadow: 0 0 30px rgba(76, 175, 80, 0.2); }
        .modal-poster { width: 40%; background: #000; }
        .modal-poster img { width: 100%; height: 100%; object-fit: cover; }
        .modal-details { width: 60%; padding: 30px; position: relative; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 28px; color: #aaa; cursor: pointer; transition: color 0.2s; line-height: 1; }
        .close-btn:hover { color: #fff; }
        
        .d-title { font-size: 28px; margin: 0 0 5px 0; color: #4CAF50; }
        .d-meta { font-size: 14px; color: #888; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .d-section { margin-bottom: 15px; }
        .d-label { font-size: 12px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
        .d-value { font-size: 15px; color: #fff; }
        .d-overview { font-size: 14px; line-height: 1.6; color: #ccc; margin-top: 20px; background: #2d2d2d; padding: 15px; border-radius: 8px; border-left: 3px solid #4CAF50; }

        @media (max-width: 768px) {
            .modal-content { flex-direction: column; }
            .modal-poster, .modal-details { width: 100%; }
            .modal-poster { height: 300px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="title">Athena Cinema Lab</h1>
        <div id="db-status" class="status-bar" style="color: #ff9800;">🟡 ATTESA JSON MASTER</div>
    </div>

    <div class="upload-section">
        <div class="file-input-wrapper">
            <input type="file" id="db-file" accept=".json" class="search-input" style="flex-grow: 1;">
            <div style="font-size: 12px; color: #888;">Carica il file "storico_master.json" per abilitare il motore di ricerca.</div>
        </div>
    </div>

    <div class="search-panel">
        <div class="search-grid">
            <input type="text" id="search-title" class="search-input" placeholder="Titolo (es. Batman)...">
            <input type="number" id="search-year" class="search-input" placeholder="Anno (es. 2024)...">
            <input type="text" id="search-director" class="search-input" placeholder="Regista...">
            <input type="text" id="search-actor" class="search-input" placeholder="Attore/Attrice...">
            <input type="text" id="search-country" class="search-input" placeholder="Paese (es. Italy)...">
            
            <select id="search-type" class="search-input">
                <option value="">Tutte le Tipologie</option>
                <option value="2">2 - Uscita Limitata</option>
                <option value="3">3 - Cinema (Theatrical)</option>
                <option value="4">4 - Digitale (Streaming/VOD)</option>
                <option value="5">5 - Supporto Fisico (DVD/Blu-Ray)</option>
                <option value="6">6 - Film TV</option>
            </select>

            <select id="search-genre" class="search-input">
                <option value="">Tutti i Generi</option>
                <option value="azione">Azione</option>
                <option value="animazione">Animazione</option>
                <option value="avventura">Avventura</option>
                <option value="commedia">Commedia</option>
                <option value="crime">Crime</option>
                <option value="documentario">Documentario</option>
                <option value="dramma">Dramma</option>
                <option value="famiglia">Famiglia</option>
                <option value="fantascienza">Fantascienza</option>
                <option value="fantasy">Fantasy</option>
                <option value="guerra">Guerra</option>
                <option value="horror">Horror</option>
                <option value="mistero">Mistero</option>
                <option value="musica">Musica</option>
                <option value="romance">Romance</option>
                <option value="storia">Storia</option>
                <option value="thriller">Thriller</option>
                <option value="western">Western</option>
            </select>
        </div>
        <button class="btn-search" onclick="searchManual()">Avvia Ricerca Ibrida</button>
    </div>

    <div class="results-header">
        <span id="results-count">Risultati: 0</span>
        <span style="font-size: 12px; color: #888;">Motore Ibrido: Locale + TMDB Online</span>
    </div>

    <div id="results-grid" class="grid-container">
        </div>

    <div id="modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-poster">
                <img id="m-img" src="" alt="Poster">
            </div>
            <div class="modal-details">
                <span class="close-btn" onclick="closeModal()">&times;</span>
                <h2 id="m-title" class="d-title">Titolo</h2>
                <div id="m-meta" class="d-meta">Data • Generi</div>
                
                <div class="d-section">
                    <div class="d-label">Regia</div>
                    <div id="m-director" class="d-value">N/D</div>
                </div>
                <div class="d-section">
                    <div class="d-label">Cast Principale</div>
                    <div id="m-cast" class="d-value">N/D</div>
                </div>
                <div class="d-section">
                    <div class="d-label">Produzione</div>
                    <div id="m-country" class="d-value">N/D</div>
                </div>
                <div class="d-section">
                    <div class="d-label">Tipologia di Uscita (IT)</div>
                    <div id="m-type" class="d-value">N/D</div>
                </div>
                
                <div id="m-overview" class="d-overview">Trama non disponibile.</div>
            </div>
        </div>
    </div>

    <script>
        const TMDB_API_KEY = "e2d58e4dfdd0a14cdce19d08d49bb21e";
        let localDB = [];
        let currentMergedResults = new Map(); // Mappa per fondere Locale e TMDB senza doppioni

        // GESTIONE CARICAMENTO FILE
        document.getElementById('db-file').addEventListener('change', function(e) {
            let file = e.target.files[0];
            if (!file) return;
            
            let reader = new FileReader();
            reader.onload = function(e) {
                try {
                    localDB = JSON.parse(e.target.result);
                    // Passiamo l'oggetto file alla funzione per leggerne i metadati fisici
                    updateDbStatus(file);
                    document.getElementById('results-count').innerText = `Database Caricato: ${localDB.length} record`;
                } catch(err) {
                    alert("Errore nel file JSON. Assicurati che sia il file master valido.");
                }
            };
            reader.readAsText(file);
        });

        // OROLOGIO FISICO E SEMAFORO (Check 15 giorni)
        function updateDbStatus(file) {
            if(localDB.length === 0) return;
            let statusEl = document.getElementById('db-status');
            
            if(file && file.lastModified) {
                let fileDate = new Date(file.lastModified);
                let today = new Date();
                
                // Calcolo giorni di differenza
                let diffTime = today.getTime() - fileDate.getTime();
                let diffDays = Math.floor(diffTime / (1000 * 3600 * 24));
                
                // Formattazione data italiana (GG/MM/AAAA)
                let day = String(fileDate.getDate()).padStart(2, '0');
                let month = String(fileDate.getMonth() + 1).padStart(2, '0');
                let year = fileDate.getFullYear();
                let formattedDate = `${day}/${month}/${year}`;

                if (diffDays > 15) {
                    statusEl.innerText = `🔴 AGGIORNA DB (${formattedDate})`;
                    statusEl.style.color = "#ff4444"; // Rosso allarme
                    statusEl.style.fontWeight = "bold";
                } else {
                    statusEl.innerText = `🟢 DB ALLINEATO (${formattedDate})`;
                    statusEl.style.color = "#4CAF50"; // Verde sicuro
                    statusEl.style.fontWeight = "normal";
                }
            } else {
                 statusEl.innerText = `🟢 DB CARICATO`;
                 statusEl.style.color = "#4CAF50";
            }
        }

        // MOTORE DI RICERCA IBRIDO E FILTRI AVANZATI
        function searchManual() {
            if(localDB.length === 0) {
                alert("Carica prima il file master JSON.");
                return;
            }

            // Lettura filtri
            let titleQuery = document.getElementById('search-title').value.toLowerCase().trim();
            let yearQuery = document.getElementById('search-year').value.trim();
            let directorQuery = document.getElementById('search-director').value.toLowerCase().trim();
            let actorQuery = document.getElementById('search-actor').value.toLowerCase().trim();
            let countryQuery = document.getElementById('search-country').value.toLowerCase().trim();
            let typeQuery = document.getElementById('search-type').value;
            let genreQuery = document.getElementById('search-genre').value.toLowerCase();

            currentMergedResults.clear();

            // 1. RICERCA LOCALE (Precisione Assoluta)
            let localResults = localDB.filter(m => {
                let matchTitle = !titleQuery || (m.title && m.title.toLowerCase().includes(titleQuery));
                let matchYear = !yearQuery || (m.release_date && m.release_date.startsWith(yearQuery));
                let matchDirector = !directorQuery || (m.director && m.director.toLowerCase().includes(directorQuery));
                let matchActor = !actorQuery || (m.cast && m.cast.toLowerCase().includes(actorQuery));
                let matchCountry = !countryQuery || (m.paese && m.paese.toLowerCase().includes(countryQuery));
                // Filtri Inclusivi
                let matchType = !typeQuery || (m.release_type && m.release_type.includes(typeQuery));
                let matchGenre = !genreQuery || (m.genres && m.genres.toLowerCase().includes(genreQuery));

                return matchTitle && matchYear && matchDirector && matchActor && matchCountry && matchType && matchGenre;
            });

            // Aggiungiamo i risultati locali alla Mappa (Timbro: ATHENA)
            localResults.forEach(m => {
                m._source = 'ATHENA';
                currentMergedResults.set(String(m.id), m);
            });

            // 2. RICERCA TMDB ONLINE (Rete a Strascico - Solo se c'è il Titolo)
            if (titleQuery) {
                fetchFromTMDB(titleQuery, yearQuery);
            } else {
                renderResults();
            }
        }

        async function fetchFromTMDB(query, year) {
            let url = `https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&language=it-IT&query=${encodeURIComponent(query)}`;
            if (year) {
                url += `&primary_release_year=${year}`;
            }

            try {
                document.getElementById('results-count').innerText = "Rete a strascico in corso...";
                let response = await fetch(url);
                let data = await response.json();
                
                if (data.results) {
                    data.results.forEach(m => {
                        let strId = String(m.id);
                        // Se l'ID non è già stato trovato nel database locale, lo aggiungiamo come "Trovato su TMDB"
                        if (!currentMergedResults.has(strId)) {
                            currentMergedResults.set(strId, {
                                id: strId,
                                title: m.title,
                                release_date: m.release_date || "N/D",
                                poster_path: m.poster_path,
                                _source: 'TMDB' // Timbro Rete
                            });
                        }
                    });
                }
                renderResults();
            } catch (error) {
                console.error("Errore TMDB:", error);
                renderResults(); // Mostriamo almeno i locali in caso di errore rete
            }
        }

        function renderResults() {
            let grid = document.getElementById('results-grid');
            grid.innerHTML = '';
            
            // Convertiamo la Mappa in Array
            let finalResults = Array.from(currentMergedResults.values());
            
            // Ordinamento dal più recente al più vecchio
            finalResults.sort((a, b) => {
                let dA = a.release_date || "0000";
                let dB = b.release_date || "0000";
                return dB.localeCompare(dA);
            });

            document.getElementById('results-count').innerText = `Risultati: ${finalResults.length}`;

            finalResults.forEach(m => {
                let card = document.createElement('div');
                card.className = 'movie-card';
                card.onclick = () => openDetails(m.id);

                let posterUrl = m.poster_path 
                    ? `https://image.tmdb.org/t/p/w300${m.poster_path}` 
                    : 'https://via.placeholder.com/300x450/2d2d2d/666666?text=No+Poster';

                let year = m.release_date ? m.release_date.split('-')[0] : "N/D";
                
                let badge = m._source === 'ATHENA' 
                    ? `<span class="badge-source badge-local">DATABASE</span>` 
                    : `<span class="badge-source badge-tmdb">TMDB ONLINE</span>`;

                card.innerHTML = `
                    <div class="poster-container">
                        <img class="poster" src="${posterUrl}" loading="lazy" alt="${m.title}">
                    </div>
                    <div class="card-info">
                        <div>
                            <h3 class="m-title">${m.title}</h3>
                            <p class="m-meta">${year}</p>
                        </div>
                        ${badge}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        async function openDetails(id) {
            let m = localDB.find(x => String(x.id) === String(id));

            // Caso A: Trovato nel DB Locale (Nessuna chiamata di rete per rispettare la Purity)
            if (m) {
                populateModal(m);
            } 
            // Caso B: È un film trovato dalla Rete a Strascico TMDB
            else {
                document.getElementById('m-title').innerText = "Caricamento dettagli da TMDB...";
                document.getElementById('modal').style.display = 'flex';
                
                try {
                    let url = `https://api.themoviedb.org/3/movie/${id}?api_key=${TMDB_API_KEY}&language=it-IT&append_to_response=credits,release_dates`;
                    let response = await fetch(url);
                    let tmdbData = await response.json();
                    
                    // Normalizziamo i dati "al volo" per simulare un oggetto locale
                    let director = tmdbData.credits?.crew?.find(p => p.job === 'Director')?.name || "N/D";
                    let cast = tmdbData.credits?.cast?.slice(0, 10).map(a => a.name).join(", ") || "N/D";
                    let countries = tmdbData.production_countries?.map(c => c.name).join(", ") || "N/D";
                    let genres = tmdbData.genres?.map(g => g.name).join(", ") || "N/D";
                    
                    let tipologie_it = new Set();
                    if (tmdbData.release_dates && tmdbData.release_dates.results) {
                        for (let c_data of tmdbData.release_dates.results) {
                            if (c_data.iso_3166_1 === 'IT') {
                                for (let rel of c_data.release_dates) {
                                    if (rel.type) tipologie_it.add(String(rel.type));
                                }
                                break;
                            }
                        }
                    }
                    let tipologia_str = tipologie_it.size > 0 ? Array.from(tipologie_it).sort().join(", ") : "N/D";

                    let tempMovieObj = {
                        title: tmdbData.title,
                        release_date: tmdbData.release_date,
                        poster_path: tmdbData.poster_path,
                        overview: tmdbData.overview,
                        director: director,
                        cast: cast,
                        paese: countries,
                        genres: genres,
                        release_type: tipologia_str
                    };
                    
                    populateModal(tempMovieObj);
                } catch (e) {
                    console.error("Errore TMDB Detail:", e);
                    document.getElementById('m-title').innerText = "Errore di connessione.";
                }
            }
        }

        function populateModal(m) {
            document.getElementById('modal').style.display = 'flex';
            
            document.getElementById('m-title').innerText = m.title || "N/D";
            document.getElementById('m-meta').innerText = `USCITA: ${m.release_date || 'N/D'} • GENERE: ${m.genres || 'N/D'}`;
            
            document.getElementById('m-director').innerText = m.director || "N/D";
            document.getElementById('m-cast').innerText = m.cast || "N/D";
            document.getElementById('m-country').innerText = m.paese || "N/D";
            document.getElementById('m-type').innerText = m.release_type || "N/D";
            
            document.getElementById('m-overview').innerText = m.overview || "Nessuna trama disponibile in italiano.";
            
            let posterUrl = m.poster_path 
                ? `https://image.tmdb.org/t/p/w500${m.poster_path}` 
                : 'https://via.placeholder.com/500x750/2d2d2d/666666?text=No+Poster';
            document.getElementById('m-img').src = posterUrl;
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        // Chiudi modale cliccando fuori
        window.onclick = function(event) {
            let modal = document.getElementById('modal');
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
